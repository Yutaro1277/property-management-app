        };

        // New Contract View - Refined Implementation
        // ===== 銀行名・支店名検索コンポーネント =====
        // データソース: bank.teraren.com (zengin-code準拠 / 毎日更新)
        // 参照先サイト: https://zengin.ajtw.net/ (手動検索用)
        const _bankCache = { banks: null, branches: {} }; // グローバルキャッシュ

        // 全角→半角カナ変換（グローバル共通関数）
        const toHalfKana = (str) => {
            if (!str) return '';
            const map = {
                'ア': 'ｱ', 'イ': 'ｲ', 'ウ': 'ｳ', 'エ': 'ｴ', 'オ': 'ｵ',
                'カ': 'ｶ', 'キ': 'ｷ', 'ク': 'ｸ', 'ケ': 'ｹ', 'コ': 'ｺ',
                'サ': 'ｻ', 'シ': 'ｼ', 'ス': 'ｽ', 'セ': 'ｾ', 'ソ': 'ｿ',
                'タ': 'ﾀ', 'チ': 'ﾁ', 'ツ': 'ﾂ', 'テ': 'ﾃ', 'ト': 'ﾄ',
                'ナ': 'ﾅ', 'ニ': 'ﾆ', 'ヌ': 'ﾇ', 'ネ': 'ﾈ', 'ノ': 'ﾉ',
                'ハ': 'ﾊ', 'ヒ': 'ﾋ', 'フ': 'ﾌ', 'ヘ': 'ﾍ', 'ホ': 'ﾎ',
                'マ': 'ﾏ', 'ミ': 'ﾐ', 'ム': 'ﾑ', 'メ': 'ﾒ', 'モ': 'ﾓ',
                'ヤ': 'ﾔ', 'ユ': 'ﾕ', 'ヨ': 'ﾖ',
                'ラ': 'ﾗ', 'リ': 'ﾘ', 'ル': 'ﾙ', 'レ': 'ﾚ', 'ロ': 'ﾛ',
                'ワ': 'ﾜ', 'ヲ': 'ｦ', 'ン': 'ﾝ',
                'ァ': 'ｧ', 'ィ': 'ｨ', 'ゥ': 'ｩ', 'ェ': 'ｪ', 'ォ': 'ｫ',
                'ッ': 'ｯ', 'ャ': 'ｬ', 'ュ': 'ｭ', 'ョ': 'ｮ',
                'ガ': 'ｶﾞ', 'ギ': 'ｷﾞ', 'グ': 'ｸﾞ', 'ゲ': 'ｹﾞ', 'ゴ': 'ｺﾞ',
                'ザ': 'ｻﾞ', 'ジ': 'ｼﾞ', 'ズ': 'ｽﾞ', 'ゼ': 'ｾﾞ', 'ゾ': 'ｿﾞ',
                'ダ': 'ﾀﾞ', 'ヂ': 'ﾁﾞ', 'ヅ': 'ﾂﾞ', 'デ': 'ﾃﾞ', 'ド': 'ﾄﾞ',
                'バ': 'ﾊﾞ', 'ビ': 'ﾋﾞ', 'ブ': 'ﾌﾞ', 'ベ': 'ﾍﾞ', 'ボ': 'ﾎﾞ',
                'パ': 'ﾊﾟ', 'ピ': 'ﾋﾟ', 'プ': 'ﾌﾟ', 'ペ': 'ﾍﾟ', 'ポ': 'ﾎﾟ',
                'ヴ': 'ｳﾞ', 'ー': 'ｰ', '。': '｡', '「': '｢', '」': '｣', '、': '､', '・': '･'
            };
            return str.split('').map(c => map[c] || c).join('');
        };

        // ひらがな→カタカナ変換
        const toKatakana = (str) => str ? str.replace(/[\u3041-\u3096]/g, c => String.fromCharCode(c.charCodeAt(0) + 0x60)) : str;

        // 検索クエリを正規化（ひらがな・カタカナ・半角カナ・漢字すべて対応）
        const normalizeQuery = (q) => {
            if (!q) return '';
            const kata = toKatakana(q);
            const half = toHalfKana(kata);
            return half.toLowerCase();
        };

        // 銀行一覧を取得（キャッシュあり）
        const fetchBanks = async () => {
            if (_bankCache.banks) return _bankCache.banks;
            const res = await fetch('https://bank.teraren.com/banks.json');
            if (!res.ok) throw new Error('Bank API error');
            const banks = await res.json();
            _bankCache.banks = banks;
            return banks;
        };

        // 支店一覧を取得（銀行CDごとにキャッシュ）
        const fetchBranches = async (bankCode) => {
            if (!bankCode) return [];
            if (_bankCache.branches[bankCode]) return _bankCache.branches[bankCode];
            const res = await fetch(`https://bank.teraren.com/banks/${bankCode}/branches.json`);
            if (!res.ok) throw new Error('Branch API error');
            const branches = await res.json();
            _bankCache.branches[bankCode] = branches;
            return branches;
        };

        const BankSearchInput = ({ value, onSelect, placeholder, bankCode, mode }) => {
            // mode='bank'(銀行検索) または mode='branch'(支店検索)
            const isBank = mode !== 'branch';
            const [query, setQuery] = React.useState(value || '');
            const [suggestions, setSuggestions] = React.useState([]);
            const [loading, setLoading] = React.useState(false);
            const [showDropdown, setShowDropdown] = React.useState(false);
            const [noResult, setNoResult] = React.useState(false);
            const timerRef = React.useRef(null);
            const prevBankCode = React.useRef(bankCode);

            // valueが外から変わった場合に同期
            React.useEffect(() => { setQuery(value || ''); }, [value]);

            // 銀行CDが変わったら支店名フィールドをリセット
            React.useEffect(() => {
                if (!isBank && bankCode !== prevBankCode.current) {
                    prevBankCode.current = bankCode;
                    setQuery('');
                    setSuggestions([]);
                    setShowDropdown(false);
                    setNoResult(false);
                }
            }, [bankCode, isBank]);

            const search = async (q) => {
                if (!q || q.length < 1) { setSuggestions([]); setNoResult(false); return; }
                setLoading(true);
                setNoResult(false);
                try {
                    let results = [];
                    const nq = normalizeQuery(q);
                    const qLower = q.toLowerCase();

                    if (isBank) {
                        const banks = await fetchBanks();
                        // 前方一致優先、部分一致を後ろに
                        const startsWith = [];
                        const contains = [];
                        banks.forEach(b => {
                            const nameMatch = (b.name || '').includes(q);
                            const kanaMatch = normalizeQuery(b.kana || '').includes(nq);
                            const hiraMatch = (b.hira || '').includes(q);
                            const romaMatch = (b.roma || '').toLowerCase().includes(qLower);
                            if (nameMatch || kanaMatch || hiraMatch || romaMatch) {
                                const item = {
                                    code: String(b.code).padStart(4, '0'),
                                    label: toHalfKana(b.kana || b.name || ''),
                                    name: b.name,
                                };
                                // 前方一致かどうか判定
                                if ((b.name || '').startsWith(q) || normalizeQuery(b.kana || '').startsWith(nq)) {
                                    startsWith.push(item);
                                } else {
                                    contains.push(item);
                                }
                            }
                        });
                        results = [...startsWith, ...contains].slice(0, 15); // 最大15件
                    } else {
                        // 支店検索: 銀行CDが必要
                        if (!bankCode) {
                            setSuggestions([]);
                            setLoading(false);
                            return;
                        }
                        const branches = await fetchBranches(bankCode);
                        const startsWith = [];
                        const contains = [];
                        branches.forEach(b => {
                            const nameMatch = (b.name || '').includes(q);
                            const kanaMatch = normalizeQuery(b.kana || '').includes(nq);
                            const hiraMatch = (b.hira || '').includes(q);
                            if (nameMatch || kanaMatch || hiraMatch) {
                                const item = {
                                    code: String(b.code).padStart(3, '0'),
                                    label: toHalfKana(b.kana || b.name || ''),
                                    name: b.name,
                                };
                                if ((b.name || '').startsWith(q) || normalizeQuery(b.kana || '').startsWith(nq)) {
                                    startsWith.push(item);
                                } else {
                                    contains.push(item);
                                }
                            }
                        });
                        results = [...startsWith, ...contains].slice(0, 15);
                    }

                    setSuggestions(results);
                    setShowDropdown(results.length > 0);
                    setNoResult(results.length === 0);
                } catch (e) {
                    console.error('Bank search failed:', e);
                    setNoResult(true);
                } finally {
                    setLoading(false);
                }
            };

            const handleChange = (e) => {
                const v = e.target.value;
                setQuery(v);
                setShowDropdown(false);
                setNoResult(false);
                clearTimeout(timerRef.current);
                timerRef.current = setTimeout(() => search(v), 350);
            };

            const handleSelect = (item) => {
                const halfKana = toHalfKana(item.label);
                setQuery(halfKana);
                setSuggestions([]);
                setShowDropdown(false);
                setNoResult(false);
                onSelect({ name: halfKana, code: item.code, displayName: item.name });
            };

            // フォーカスを外した時: 手動入力した値もそのまま反映
            const handleBlur = () => {
                setTimeout(() => {
                    setShowDropdown(false);
                    if (query) {
                        const halfKana = toHalfKana(toKatakana(query));
                        setQuery(halfKana);
                        if (halfKana !== value) {
                            onSelect({ name: halfKana, code: null, displayName: halfKana });
                        }
                    }
                }, 200);
            };

            const needsBankFirst = !isBank && !bankCode;
            const defaultPlaceholder = isBank
                ? '銀行名で検索（例：三菱、みずほ）'
                : (needsBankFirst ? '先に銀行名を選択してください' : '支店名で検索（例：本店、渋谷）');

            return (
                <div style={{ position: 'relative' }}>
                    <div style={{ position: 'relative' }}>
                        <input
                            type="text"
                            className="form-input"
                            style={{ width: '100%', boxSizing: 'border-box', paddingRight: loading ? '5rem' : '0.75rem' }}
                            value={query}
                            onChange={handleChange}
                            onFocus={() => { if (suggestions.length > 0) setShowDropdown(true); }}
                            onBlur={handleBlur}
                            placeholder={placeholder || defaultPlaceholder}
                            disabled={needsBankFirst}
                        />
                        {loading && (
                            <span style={{ position: 'absolute', right: '0.5rem', top: '50%', transform: 'translateY(-50%)', fontSize: '0.7rem', color: '#94a3b8', pointerEvents: 'none' }}>
                                検索中...
                            </span>
                        )}
                    </div>

                    {/* サジェストドロップダウン */}
                    {showDropdown && suggestions.length > 0 && (
                        <div style={{ position: 'absolute', top: '100%', left: 0, right: 0, zIndex: 9999, background: '#fff', border: '1px solid #e2e8f0', borderRadius: '0.5rem', boxShadow: '0 4px 16px rgba(0,0,0,0.12)', maxHeight: '260px', overflowY: 'auto' }}>
                            {suggestions.map((item, i) => (
                                <div
                                    key={i}
                                    onMouseDown={(e) => { e.preventDefault(); handleSelect(item); }}
                                    style={{ padding: '0.6rem 0.75rem', cursor: 'pointer', borderBottom: '1px solid #f1f5f9', fontSize: '0.875rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}
                                    onMouseEnter={e => e.currentTarget.style.background = '#f0f9ff'}
                                    onMouseLeave={e => e.currentTarget.style.background = ''}
                                >
                                    <div>
                                        <span style={{ fontWeight: 600 }}>{toHalfKana(item.label)}</span>
                                        <span style={{ color: '#64748b', marginLeft: '0.4rem', fontSize: '0.8rem' }}>{item.name}</span>
                                    </div>
                                    <span style={{ color: '#94a3b8', fontSize: '0.75rem', fontFamily: 'monospace' }}>[{item.code}]</span>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* 検索結果なし */}
                    {noResult && !loading && query.length > 0 && (
                        <div style={{ position: 'absolute', top: '100%', left: 0, right: 0, zIndex: 9999, background: '#fffbeb', border: '1px solid #fcd34d', borderRadius: '0.5rem', padding: '0.6rem 0.75rem', fontSize: '0.8rem', color: '#92400e' }}>
                            候補が見つかりませんでした。そのまま手打ちで入力するか、
                            <a href="https://zengin.ajtw.net/" target="_blank" rel="noopener" style={{ color: '#2563eb', marginLeft: '0.25rem' }}>
                                全銀コード検索 ↗
                            </a> で確認してください。
                        </div>
                    )}
                </div>
            );
        };

            const handleInputChange = (e) => {

                if (['postalCode', 'rentMonthly', 'commonFeeMonthly', 'parkingFeeMonthly', 'deposit', 'keyMoney', 'renewalFee', 'userEmpNo', 'userDeptCd'].includes(name) || name.startsWith('bankInfo.') || name.endsWith('PostalCode') || name.endsWith('Tel') || name.endsWith('Fax')) {

                if (name.startsWith('bankInfo.')) {

                    if (field === 'bankCode' && finalValue.length === 4) {

                    } else if (field === 'branchCode' && finalValue.length === 3 && bankInfoUpdate.bankCode) {
                        const branchName = store.lookupBranchName(bankInfoUpdate.bankCode, finalValue);
                        if (branchName) {
                            bankInfoUpdate.branchName = store.toHalfWidthKana(branchName);
                        }
                    } else if (field === 'bankName') {
                        bankInfoUpdate.bankName = store.toHalfWidthKana(finalValue);
                        const bankCd = store.lookupBankCdByName(bankInfoUpdate.bankName);
                        if (bankCd) {
                            bankInfoUpdate.bankCode = bankCd;
                        }
                    } else if (field === 'branchName') {
                        bankInfoUpdate.branchName = store.toHalfWidthKana(finalValue);
                    } else if (field === 'accountName') {
                        bankInfoUpdate.accountName = store.toHalfWidthKana(finalValue);
                    }

                    setFormData(prev => ({
                        ...prev,
                        bankInfo: bankInfoUpdate
                    }));
                    return;
                }

                setFormData(prev => ({ ...prev, [name]: finalValue }));

                if (name === 'postalCode') {
                    const normalized = finalValue.replace(/[-\s]/g, '');
                    if (normalized.length === 7) {
                        fetch(`https://zipcloud.ibsnet.co.jp/api/search?zipcode=${normalized}`)
                            .then(res => res.json())
                            .then(data => {
                                if (data.results && data.results[0]) {
                                    const r = data.results[0];
                                    const addr = `${r.address1}${r.address2}${r.address3}`;
                                    setFormData(prev => ({ ...prev, address: addr }));
                                }
                            })
                            .catch(err => console.error('Postal search failed', err));
                    }
                }

                // 関係先の郵便番号自動入力
                const postalKeyMap = {
                    landlordPostalCode: 'landlordAddress',
                    managementPostalCode: 'managementAddress',
                    brokerPostalCode: 'brokerAddress'
                };
                if (postalKeyMap[name]) {
                    const normalized = finalValue.replace(/[-\s]/g, '');
                    if (normalized.length === 7) {
                        const addrField = postalKeyMap[name];
                        fetch(`https://zipcloud.ibsnet.co.jp/api/search?zipcode=${normalized}`)
                            .then(res => res.json())
                            .then(data => {
                                if (data.results && data.results[0]) {
                                    const r = data.results[0];
                                    const addr = `${r.address1}${r.address2}${r.address3}`;
                                    setFormData(prev => ({ ...prev, [addrField]: addr }));
                                }
                            })
                            .catch(err => console.error('Postal search failed', err));
                    }
                }

                // 銀行・支店情報の自動取得
                if (name === 'bankInfo.bankCode' && finalValue.length === 4) {
                    const bankName = store.lookupBankName(finalValue);
                    if (bankName) {
                        setFormData(prev => ({
                            ...prev,
                            bankInfo: { ...prev.bankInfo, bankCode: finalValue, bankName: bankName }
                        }));
                    }
                } else if (name === 'bankInfo.branchCode' && finalValue.length === 3) {
                    const branchName = store.lookupBranchName(formData.bankInfo.bankCode, finalValue);
                    if (branchName) {
                        setFormData(prev => ({
                            ...prev,
                            bankInfo: { ...prev.bankInfo, branchCode: finalValue, branchName: branchName }
                        }));
                    }
                }

                // B-3: 部門CDの自動補完
                if (name === 'userEmpNo') {
                    const autoDeptCd = store.getDeptCdByEmpNo(finalValue);
                    if (autoDeptCd) {
                        setFormData(prev => ({ ...prev, userDeptCd: autoDeptCd }));
                    }
                } else if (name === 'userDeptName' && !formData.userEmpNo) {
                    const autoDeptCd = store.getDeptCdByDeptName(finalValue);
                    if (autoDeptCd) {
                        setFormData(prev => ({ ...prev, userDeptCd: autoDeptCd }));
                    }
                }

                // A-1: 業者MCD自動付番ヘルパー関数
                const assignVendorMcd = (companyName, prefix, vendorCdField) => {
                    if (!companyName) {
                        setFormData(prev => ({ ...prev, [vendorCdField]: '' }));
                        return;
                    }
                    const existingCd = store.getVendorCdByName(companyName);
                    if (existingCd && existingCd.startsWith(prefix)) {
                        setFormData(prev => ({ ...prev, [vendorCdField]: existingCd }));
                    } else {
                        const newCd = store.generateVendorMcd(prefix);
                        setFormData(prev => ({ ...prev, [vendorCdField]: newCd }));
                    }
                };

                // A-1: 業者名変更時の自動付番呼び出し
                if (name === 'landlordName') assignVendorMcd(finalValue, 'L', 'landlordVendorCd');
                if (name === 'managementName') assignVendorMcd(finalValue, 'M', 'managementVendorCd');
                if (name === 'brokerName') assignVendorMcd(finalValue, 'B', 'brokerVendorCd');

            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const newContract = {
                    id: 'NEW_' + Date.now(),
                    ...formData,
                    rentMonthly: parseInt(formData.rentMonthly) || 0,
                    commonFeeMonthly: parseInt(formData.commonFeeMonthly) || 0,
                    parkingFeeMonthly: parseInt(formData.parkingFeeMonthly) || 0,
                    electricity: parseInt(formData.electricity) || 0,
                    water: parseInt(formData.water) || 0,
                    gas: parseInt(formData.gas) || 0,
                    deposit: parseInt(formData.deposit) || 0,
                    keyMoney: parseInt(formData.keyMoney) || 0,
                    renewalFee: parseInt(formData.renewalFee) || 0,
                    status: 'active',
                    registerDate: new Date().toISOString().split('T')[0],
                    updateHistory: []
                };
                // 貸主・管理会社・仲介会社をベンダーマスタに自動登録
                const registerVendor = (name, contact, tel, fax, email, address, postalCode, building, contactTel, typeCode, propertyMcd) => {
                    if (!name) return;
                    const existing = store.vendors.find(v => v.name === name && v.propertyMcd === propertyMcd);
                    if (!existing) {
                        const newCd = store.generateVendorCd(typeCode);
                        store.vendors.push({
                            vendorCd: newCd,
                            name,
                            contactPerson: contact,
                            tel,
                            fax,
                            email,
                            address,
                            postalCode,
                            building,
                            contactTel,
                            vendorType: typeCode,
                            propertyMcd: propertyMcd,
                            isLatest: 1,
                            version: 1,
                            updatedAt: new Date().toISOString()
                        });
                    }
                };
                registerVendor(formData.landlordName, formData.landlordContact, formData.landlordTel, formData.landlordFax, formData.landlordEmail, formData.landlordAddress, formData.landlordPostalCode, formData.landlordBuilding, formData.landlordContactTel, '1', newContract.propertyMcd);
                registerVendor(formData.managementName, formData.managementContact, formData.managementTel, formData.managementFax, formData.managementEmail, formData.managementAddress, formData.managementPostalCode, formData.managementBuilding, formData.managementContactTel, '2', newContract.propertyMcd);
                registerVendor(formData.brokerName, formData.brokerContact, formData.brokerTel, formData.brokerFax, formData.brokerEmail, formData.brokerAddress, formData.brokerPostalCode, formData.brokerBuilding, formData.brokerContactTel, '3', newContract.propertyMcd);
                store.addContract(newContract);
                alert('新規契約を登録しました');
                setFormData(prev => ({
                    ...prev,
                    propertyName: '', address: '', buildingUnit: '',
                    userName: '', userEmpNo: '', userDeptCd: '', userDeptName: '',
                    landlordName: '', landlordContact: '', landlordTel: '', landlordFax: '', landlordEmail: '', landlordPostalCode: '', landlordAddress: '', landlordBuilding: '', landlordVendorCd: '',
                    managementName: '', managementContact: '', managementTel: '', managementFax: '', managementEmail: '', managementPostalCode: '', managementAddress: '', managementBuilding: '', managementVendorCd: '',
                    brokerName: '', brokerContact: '', brokerTel: '', brokerFax: '', brokerEmail: '', brokerPostalCode: '', brokerAddress: '', brokerBuilding: '', brokerVendorCd: '',
                    startDate: '', endDate: '', rentMonthly: '', commonFeeMonthly: '', parkingFeeMonthly: '',
                    deposit: '', keyMoney: '', renewalFee: '', remarks: '',
                    parkingSpaceNum: '', electricity: '', water: '', gas: '',
                    bankInfo: { bankName: '', bankCode: '', branchName: '', branchCode: '', accountType: '1', accountNumber: '', accountName: '' },
                    propertyMcd: store.generatePropertyMcd(prev.propertyTypeCd)
                }));
            };

            const SectionHeader = ({ title }) => (
                <h4 style={{
                    borderLeft: '4px solid var(--primary-color)',
                    paddingLeft: '0.75rem',
                    marginTop: '2rem',
                    marginBottom: '1rem',
                    color: 'var(--text-main)'
                }}>
                    {title}
                </h4>
            );

            return (
                <div style={{ padding: '2rem', maxWidth: '1000px', margin: '0 auto' }}>
                    <h2 style={{ marginBottom: '2rem' }}>新規契約登録</h2>

                    <form onSubmit={handleSubmit} onKeyDown={e => { if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') e.preventDefault(); }}>
                        <SectionHeader title="物件基本情報" />
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1.5rem' }}>
                            <div className="form-group">
                                <label className="form-label">物件MCD (自動採番)</label>
                                <input type="text" className="form-input" value={formData.propertyMcd} readOnly style={{ background: '#f1f5f9' }} />
                            </div>
                            <div className="form-group">
                                <label className="form-label">物件区分 *</label>
                                <select className="form-select" name="propertyTypeCd" value={formData.propertyTypeCd} onChange={handleInputChange} required>
                                    {store.getMasterDataByCategory('PROP_TYPE').map(m => (
                                        <option key={m.code} value={m.code}>{m.name}</option>
                                    ))}
                                </select>
                            </div>
                            <div className="form-group" style={{ gridColumn: '1 / -1' }}>
                                <label className="form-label">物件名 *</label>
                                <input type="text" className="form-input" name="propertyName" value={formData.propertyName} onChange={handleInputChange} required />
                            </div>
                            <div className="form-group">
                                <label className="form-label">郵便番号 *</label>
                                <input type="text" className="form-input" name="postalCode" value={formData.postalCode} onChange={handleInputChange} required />
                            </div>
                            <div className="form-group">
                                <label className="form-label">住所 *</label>
                                <input type="text" className="form-input" name="address" value={formData.address} onChange={handleInputChange} required />
                            </div>
                            <div className="form-group" style={{ gridColumn: '1 / -1' }}>
                                <label className="form-label">建物名・部屋番号</label>
                                <input type="text" className="form-input" name="buildingUnit" value={formData.buildingUnit} onChange={handleInputChange} />
                            </div>
                        </div>

                        <SectionHeader title="使用部署・契約者情報" />
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: '1.5rem' }}>
                            <div className="form-group">
                                <label className="form-label">社員番号</label>
                                <input type="text" className="form-input" name="userEmpNo" value={formData.userEmpNo} onChange={handleInputChange} />
                            </div>
                            <div className="form-group">
                                <label className="form-label">使用者名</label>
                                <input type="text" className="form-input" name="userName" value={formData.userName} onChange={handleInputChange} />
                            </div>
                            <div className="form-group">
                                <label className="form-label">部署名</label>
                                <input
                                    type="text"
                                    className="form-input"
                                    name="userDeptName"
                                    value={formData.userDeptName}
                                    onChange={handleInputChange}
                                    list="deptNameList"
                                    placeholder="検索・入力可能"
                                />
                                <datalist id="deptNameList">
                                    {store.getDeptNames().map(n => <option key={n} value={n}>{n}</option>)}
                                </datalist>
                            </div>
                            <div className="form-group">
                                <label className="form-label">部門CD</label>
                                <input type="text" className="form-input" name="userDeptCd" value={formData.userDeptCd} onChange={handleInputChange} />
                            </div>
                        </div>

                        <SectionHeader title="契約条件" />
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '1.5rem' }}>
                            <div className="form-group">
                                <label className="form-label">契約法人 *</label>
                                <select className="form-select" name="companyCd" value={formData.companyCd} onChange={handleInputChange} required>
                                    <option value="01">ロジクエスト</option>
                                    <option value="02">ジックスタッフ</option>
                                    <option value="03">ジックリース</option>
                                </select>
                            </div>
                            <div className="form-group">
                                <label className="form-label">解約予告期間</label>
                                <input type="text" className="form-input" name="cancelNotice" value={formData.cancelNotice} onChange={handleInputChange} />
                            </div>
                            <div className="form-group">
                                <label className="form-label">支払約定日</label>
                                <select className="form-select" name="paymentDate" value={formData.paymentDate} onChange={handleInputChange}>
                                    <option value="20">20日</option>
                                    <option value="25">25日</option>
                                    <option value="末日">末日</option>
                                </select>
                            </div>
                            <div className="form-group">
                                <label className="form-label">契約開始日 *</label>
                                <input type="date" className="form-input" name="startDate" value={formData.startDate} onChange={handleInputChange} required />
                            </div>
                            <div className="form-group">
                                <label className="form-label">契約終了日</label>
                                <input type="date" className="form-input" name="endDate" value={formData.endDate} onChange={handleInputChange} />
                            </div>
                        </div>

                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '1.5rem', marginTop: '1rem', background: '#f8fafc', padding: '1.5rem', borderRadius: '0.8rem', border: '1px solid #e2e8f0' }}>
                            <div className="form-group">
                                <label className="form-label">賃料 (月額) *</label>
                                <input type="number" className="form-input" name="rentMonthly" value={formData.rentMonthly} onChange={handleInputChange} required />
                            </div>
                            <div className="form-group">
                                <label className="form-label">共益費 (月額)</label>
                                <input type="number" className="form-input" name="commonFeeMonthly" value={formData.commonFeeMonthly} onChange={handleInputChange} />
                            </div>
                            <div className="form-group">
                                <label className="form-label">駐車場料金 (月額)</label>
                                <input type="number" className="form-input" name="parkingFeeMonthly" value={formData.parkingFeeMonthly} onChange={handleInputChange} />
                            </div>
                            <div className="form-group">
                                <label className="form-label">駐車場区画番号</label>
                                <input type="text" className="form-input" name="parkingSpaceNum" value={formData.parkingSpaceNum} onChange={handleInputChange} placeholder="No.123" />
                            </div>
                            <div className="form-group" style={{ gridColumn: 'span 2', minWidth: 0 }}>
                                <label className="form-label">水道光熱費 (定額/月)</label>
                                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '0.5rem', minWidth: 0 }}>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', minWidth: 0 }}>
                                        <span style={{ fontSize: '0.875rem', whiteSpace: 'nowrap' }}>電気</span>
                                        <input type="number" className="form-input" style={{ minWidth: 0, width: '100%' }} name="electricity" value={formData.electricity} onChange={handleInputChange} placeholder="0" />
                                    </div>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', minWidth: 0 }}>
                                        <span style={{ fontSize: '0.875rem', whiteSpace: 'nowrap' }}>水道</span>
                                        <input type="number" className="form-input" style={{ minWidth: 0, width: '100%' }} name="water" value={formData.water} onChange={handleInputChange} placeholder="0" />
                                    </div>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', minWidth: 0 }}>
                                        <span style={{ fontSize: '0.875rem', whiteSpace: 'nowrap' }}>ガス</span>
                                        <input type="number" className="form-input" style={{ minWidth: 0, width: '100%' }} name="gas" value={formData.gas} onChange={handleInputChange} placeholder="0" />
                                    </div>
                                </div>
                            </div>
                            <div className="form-group">
                                <label className="form-label">敷金</label>
                                <input type="number" className="form-input" name="deposit" value={formData.deposit} onChange={handleInputChange} />
                            </div>
                            <div className="form-group">
                                <label className="form-label">礼金</label>
                                <input type="number" className="form-input" name="keyMoney" value={formData.keyMoney} onChange={handleInputChange} />
                            </div>
                        </div>

                        <SectionHeader title="関係先情報" />
                        {[['landlord', '貸主'], ['management', '管理会社'], ['broker', '仲介会社']].map(([key, label]) => (
                            <div key={key} style={{ background: '#f8fafc', border: '1px solid var(--border-color)', borderRadius: '0.5rem', padding: '1.25rem', marginBottom: '1.5rem' }}>
                                <div style={{ fontWeight: 'bold', marginBottom: '1rem', color: 'var(--primary-color)', fontSize: '1rem', borderBottom: '1px solid #e2e8f0', paddingBottom: '0.5rem' }}>{label}</div>
                                {formData[`${key}Name`] && (
                                    <div className="form-group" style={{ marginBottom: '1rem' }}>
                                        <label className="form-label">業者MCD (自動付番)</label>
                                        <input type="text" className="form-input" value={formData[`${key}VendorCd`]} readOnly style={{ background: '#f1f5f9', fontFamily: 'monospace', maxWidth: '150px' }} />
                                    </div>
                                )}
                                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '1rem' }}>
                                    {/* 行1: 会社名 (2/3) | 個人か法人か (Select) (1/3) */}
                                    <div className="form-group" style={{ gridColumn: 'span 2' }}>
                                        <label className="form-label">会社名</label>
                                        <input type="text" className="form-input" name={`${key}Name`} value={formData[`${key}Name`]} onChange={handleInputChange} />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">個人か法人か</label>
                                        <select className="form-select" name={`${key}Type`} value={formData[`${key}Type`]} onChange={handleInputChange}>
                                            <option value="corporate">法人</option>
                                            <option value="individual">個人</option>
                                        </select>
                                    </div>
                                    {/* 行2: 郵便番号 (1/3) | TEL (1/3) | FAX (1/3) */}
                                    <div className="form-group">
                                        <label className="form-label">郵便番号</label>
                                        <input type="text" className="form-input" name={`${key}PostalCode`} value={formData[`${key}PostalCode`] || ''} onChange={handleInputChange} maxLength="7" />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">TEL</label>
                                        <input type="text" className="form-input" name={`${key}Tel`} value={formData[`${key}Tel`]} onChange={handleInputChange} />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">FAX</label>
                                        <input type="text" className="form-input" name={`${key}Fax`} value={formData[`${key}Fax`]} onChange={handleInputChange} />
                                    </div>
                                    {/* 行3: 住所 (2/3) | 建物名・部屋番号 (1/3) */}
                                    <div className="form-group" style={{ gridColumn: 'span 2' }}>
                                        <label className="form-label">住所</label>
                                        <input type="text" className="form-input" name={`${key}Address`} value={formData[`${key}Address`]} onChange={handleInputChange} />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">建物名・部屋番号</label>
                                        <input type="text" className="form-input" name={`${key}Building`} value={formData[`${key}Building`] || ''} onChange={handleInputChange} />
                                    </div>
                                    {/* 行4: 担当者名 (1/3) | メールアドレス (1/3) | 連絡先 (1/3) */}
                                    <div className="form-group">
                                        <label className="form-label">担当者名</label>
                                        <input type="text" className="form-input" name={`${key}Contact`} value={formData[`${key}Contact`]} onChange={handleInputChange} />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">メールアドレス</label>
                                        <input type="email" className="form-input" name={`${key}Email`} value={formData[`${key}Email`]} onChange={handleInputChange} />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">連絡先</label>
                                        <input type="text" className="form-input" name={`${key}ContactTel`} value={formData[`${key}ContactTel`]} onChange={handleInputChange} />
                                    </div>
                                </div>
                            </div>
                        ))}

                        <SectionHeader title="支払・銀行情報" />
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1.5rem', marginBottom: '1rem' }}>
                            <div className="form-group">
                                <label className="form-label">支払先</label>
                                <select className="form-select" name="paymentRecipient" value={formData.paymentRecipient} onChange={handleInputChange}>
                                    <option value="landlord">貸主</option>
                                    <option value="management">管理会社</option>
                                    <option value="broker">仲介会社</option>
                                </select>
                            </div>
                            <div className="form-group">
                                <label className="form-label">支払方法</label>
                                <select className="form-select" name="paymentMethod" value={formData.paymentMethod} onChange={handleInputChange}>
                                    <option value="01">振込</option>
                                    <option value="01b">振込（請求書）</option>
                                    <option value="02">口座振替</option>
                                </select>
                            </div>
                        </div>

                        <div style={{ background: '#f0f9ff', padding: '1.5rem', borderRadius: '0.5rem', border: '1px solid #bfdbfe' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                                <h5 style={{ margin: 0, color: '#1e40af' }}>振込先口座情報</h5>
                                <a href="https://zengin.ajtw.net/" target="_blank" rel="noopener noreferrer" style={{ fontSize: '0.75rem', color: '#2563eb' }}>全銀データ検索 ↗</a>
                            </div>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: '1rem' }}>
                                <div className="form-group" style={{ gridColumn: 'span 3' }}>
                                    <label className="form-label">銀行名 (半角カナ)</label>
                                    <BankSearchInput
                                        mode="bank"
                                        value={formData.bankInfo.bankName}
                                        onSelect={({ name, code }) => setFormData(prev => ({ ...prev, bankInfo: { ...prev.bankInfo, bankName: name, bankCode: code || prev.bankInfo.bankCode } }))}
                                    />
                                </div>
                                <div className="form-group">
                                    <label className="form-label">銀行CD</label>
                                    <input type="text" className="form-input" name="bankInfo.bankCode" value={formData.bankInfo.bankCode} onChange={handleInputChange} maxLength="4" placeholder="例: 0005" />
                                </div>
                                <div className="form-group" style={{ gridColumn: 'span 3' }}>
                                    <label className="form-label">支店名 (半角カナ)</label>
                                    <BankSearchInput
                                        mode="branch"
                                        value={formData.bankInfo.branchName}
                                        bankCode={formData.bankInfo.bankCode}
                                        onSelect={({ name, code }) => setFormData(prev => ({ ...prev, bankInfo: { ...prev.bankInfo, branchName: name, branchCode: code || prev.bankInfo.branchCode } }))}
                                    />
                                </div>

            const typeLabel = (type) => type === 'name' ? '氏名' : '部署名';

            const [showConfirm, setShowConfirm] = React.useState(null);
            const [restoreResult, setRestoreResult] = React.useState(null);

            const handleRestore = (entry) => {
                setRestoring(entry.id);
                try {
                    const ok = store.restoreFromHistory(entry.id);
                    setRestoreResult(ok ? 'success' : 'error');
                } catch (e) {
                    setRestoreResult('error');
                } finally {
                    setRestoring(null);
                    setShowConfirm(null);
                    setTimeout(() => setRestoreResult(null), 4000);
                }
            };

            const formatDate = (iso) => {
                try {
                    return new Date(iso).toLocaleString('ja-JP', {
                        year: 'numeric', month: '2-digit', day: '2-digit',
                        hour: '2-digit', minute: '2-digit', second: '2-digit'
                    });
                } catch { return iso; }
            };

                    </div>

                                        <th style={{ padding: '0.75rem', textAlign: 'left' }}>操作内容</th>
                                        <th style={{ padding: '0.75rem', textAlign: 'center' }}>契約件数</th>

                                        <tr key={entry.id} style={{ borderBottom: '1px solid var(--border-color)', background: i === 0 ? '#f0fdf4' : 'transparent' }}>
                                            <td style={{ padding: '0.75rem', fontFamily: 'monospace', fontSize: '0.8rem', color: '#64748b' }}>
                                                {formatDate(entry.timestamp)}

                                                {i > 0 ? (
                                                    <button
                                                        className="btn btn-outline"
                                                        style={{ fontSize: '0.75rem', padding: '0.25rem 0.75rem', color: '#dc2626', borderColor: '#fca5a5' }}
                                                        onClick={() => setShowConfirm(entry)}
                                                        disabled={restoring === entry.id}

                                    <button className="btn btn-danger" onClick={() => handleRestore(showConfirm)}>復元する</button>
                                </div>
                            </div>
                        </div>

                const [dragActive, setDragActive] = React.useState(false);
                const [importResult, setImportResult] = React.useState(null);

                const handleDrag = (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    if (e.type === "dragenter" || e.type === "dragover") {
                        setDragActive(true);
                    } else if (e.type === "dragleave") {
                        setDragActive(false);
                    }
                };

                const handleDrop = (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    setDragActive(false);
                    if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                        handleFile(e.dataTransfer.files[0]);
                    }
                };

                const handleFile = (file) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const csv = e.target.result;
                            const lines = csv.split('\n').filter(l => l.trim());
                            if (lines.length > 1) {
                                const result = store.importPaymentHistory(csv);
                                setImportResult(result);
                            }
                        } catch (err) {
                            setImportResult({ success: false, message: 'ファイルの読み込みに失敗しました', errors: [err.message] });
                        }
                    };
                    reader.readAsText(file, 'utf-8');
                };

                return (
                    <div>
                        <h3 style={{ marginTop: 0, marginBottom: '1.5rem' }}>支払い履歴CSV管理</h3>
                        <div
                            onDragEnter={handleDrag}

                            onDragOver={handleDrag}
                            onDrop={handleDrop}
                            style={{

                                borderRadius: '0.5rem',
                                padding: '2rem',
                                textAlign: 'center',
                                cursor: 'pointer',
                                background: dragActive ? '#f0f7ff' : 'transparent',
                                transition: 'all 0.2s'
                            }}

                            <p style={{ margin: '0.5rem 0' }}>📁 CSVファイルをドラッグ&ドロップ</p>

                            <input
                                type="file"
                                accept=".csv"
                                onChange={(e) => e.target.files && handleFile(e.target.files[0])}
                                style={{ display: 'none' }}
                                id="paymentHistoryFile"
                            />
                            <label htmlFor="paymentHistoryFile" style={{ cursor: 'pointer' }}>
                                <button className="btn btn-primary" type="button" onClick={() => document.getElementById('paymentHistoryFile').click()}>

                        {importResult && (
                            <div style={{ marginTop: '2rem', padding: '1rem', background: importResult.success ? '#dcfce7' : '#fee2e2', borderRadius: '0.5rem' }}>
                                <p style={{ color: importResult.success ? '#15803d' : '#b91c1c', fontWeight: 'bold' }}>

                            <option value="dept_master">部門CDマスタ</option>
                            <div className="form-group">
                                <label className="form-label">CSVデータ (クリックまたはドラッグ＆ドロップでファイル選択可能)</label>
                                <div
                                    style={{
                                        position: 'relative',
                                        border: '2px dashed var(--border-color)',
                                        borderRadius: '0.5rem',
                                        padding: '0.5rem',
                                        background: isDragging ? '#f0f9ff' : 'white',
                                        cursor: 'pointer',
                                        transition: 'all 0.2s'
                                    }}
                                    onDragOver={e => { e.preventDefault(); setIsDragging(true); }}
                                    onDragLeave={() => setIsDragging(false)}
                                    onDrop={e => {
                                        e.preventDefault();
                                        setIsDragging(false);
                                        const file = e.dataTransfer.files[0];
                                        if (file) {
                                            const reader = new FileReader();
                                            reader.onload = (ev) => setImportData(ev.target.result);
                                            reader.readAsText(file, 'Shift-JIS'); // 日本語CSVのためShift-JIS対応も考慮
                                        }
                                    }}
                                    onClick={() => document.getElementById('csv-file-input').click()}
                                >
                                    <input
                                        id="csv-file-input"
                                        type="file"
                                        accept=".csv,.txt"
                                        style={{ display: 'none' }}
                                        onChange={e => {
                                            const file = e.target.files[0];
                                            if (file) {
                                                const reader = new FileReader();
                                                reader.onload = (ev) => setImportData(ev.target.result);
                                                reader.readAsText(file);
                                            }
                                        }}
                                    />
                                    <textarea
                                        className="form-input"
                                        value={importData}
                                        onChange={e => setImportData(e.target.value)}
                                        rows="8"
                                        style={{
                                            fontFamily: 'monospace',
                                            fontSize: '0.875rem',
                                            width: '100%',
                                            border: 'none',
                                            outline: 'none',
                                            resize: 'vertical',
                                            background: 'transparent'
                                        }}
                                        onClick={e => e.stopPropagation()}
                                    />
                                </div>
                            </div>
                            <button className="btn btn-primary" onClick={handleImportCSV} style={{ width: '100%', marginTop: '1rem' }}>
                                インポート実行
                            </button>
                        </div>
                    </div>

                    {importResult && (
                        <div className="glass-card" style={{ marginTop: '2rem' }}>
                            <h4 style={{ marginTop: 0, marginBottom: '1rem' }}>インポート結果</h4>
                            <div style={{
                                padding: '1rem',
                                background: importResult.errors.length === 0 ? '#DCFCE7' : '#FEE2E2',
                                borderRadius: '0.5rem'
                            }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                                    <span style={{ fontWeight: 'bold', color: importResult.errors.length === 0 ? '#15803D' : '#B91C1C' }}>
                                        {importResult.errors.length === 0 ? '✅ インポート成功' : '❌ インポートエラー'}
                                    </span>
                                    <span>追加: {importResult.added}件, 更新: {importResult.updated}件</span>
                                </div>

                                {importResult.errors.length > 0 && (
                                    <div>
                                        <p style={{ fontWeight: 'bold', marginBottom: '0.5rem' }}>エラー詳細:</p>
                                        <ul style={{ margin: 0, paddingLeft: '1.5rem' }}>
                                            {importResult.errors.map((error, idx) => (
                                                <li key={idx} style={{ color: '#B91C1C', fontSize: '0.875rem', marginBottom: '0.25rem' }}>{error}</li>
                                            ))}
                                        </ul>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );

            return (
                <div className="glass-card" style={{ padding: 0 }}>
                    <div style={{ display: 'flex', background: '#f8fafc', borderBottom: '1px solid var(--border-color)', borderRadius: '0.5rem 0.5rem 0 0', overflowX: 'auto' }}>
                        <button style={tabStyle(activeTab === 'properties')} onClick={() => setActiveTab('properties')}>物件マスタ</button>
                        <button style={tabStyle(activeTab === 'vendors')} onClick={() => setActiveTab('vendors')}>業者マスタ</button>
                        <button style={tabStyle(activeTab === 'cd_master')} onClick={() => setActiveTab('cd_master')}>CDマスタ</button>
                        <button style={tabStyle(activeTab === 'dept_master')} onClick={() => setActiveTab('dept_master')}>部門CDマスタ</button>
                        <button style={tabStyle(activeTab === 'csv')} onClick={() => setActiveTab('csv')}>CSVインポート/エクスポート</button>
                        <button style={tabStyle(activeTab === 'history')} onClick={() => setActiveTab('history')}>📋 編集履歴</button>
                    </div>

                    <div style={{ padding: '2rem' }}>
                        {activeTab === 'properties' && <PropertyMasterTab />}
                        {activeTab === 'vendors' && <VendorMasterTab />}
                        {activeTab === 'cd_master' && <CodeMasterTab />}
                        {activeTab === 'dept_master' && <DeptMasterTab
                            store={store} deptMasters={deptMasters} deptNames={deptNames}
                            deptSearchTerm={deptSearchTerm} setDeptSearchTerm={setDeptSearchTerm}
                            filteredDeptMasters={filteredDeptMasters}
                            showAddDeptModal={showAddDeptModal} setShowAddDeptModal={setShowAddDeptModal}
                            editingDept={editingDept} deptForm={deptForm} setDeptForm={setDeptForm}
                            openAddDept={openAddDept} openEditDept={openEditDept}
                            handleDeptFormChange={handleDeptFormChange} handleSaveDept={handleSaveDept}
                        />}
                        {activeTab === 'csv' && <CSVTab />}
                        {activeTab === 'history' && <EditHistoryTab store={store} />}
                    </div>
                </div>
            );
        };

        // Main App
        const App = () => {
            const [currentView, setCurrentView] = React.useState('dashboard');
            const store = useStore(AppStore);
            const [syncStatus, setSyncStatus] = React.useState('loading'); // loading | idle | syncing | synced | error
            const [lastSynced, setLastSynced] = React.useState(null);

            React.useEffect(() => {
                // 初回ロード完了を検知
                if (!AppStore.isLoading()) {
                    setSyncStatus('idle');
                }
                // ポーリング時の変更を検知するためのサブスクライブ
                const unsubscribe = AppStore.subscribe(() => {
                    if (AppStore.isLoading()) {
                        setSyncStatus('loading');
                    } else {
                        setSyncStatus('synced');
                        setLastSynced(new Date());
                        setTimeout(() => setSyncStatus('idle'), 2500);
                    }
                });
                // 保存時のstatus更新をオーバーライド
                const origSave = AppStore.saveToSharedStorage.bind(AppStore);
                AppStore.saveToSharedStorage = async function (action) {
                    setSyncStatus('syncing');
                    try {
                        await origSave(action);
                        setSyncStatus('synced');
                        setLastSynced(new Date());
                        setTimeout(() => setSyncStatus('idle'), 2500);
                    } catch (e) {
                        setSyncStatus('error');
                    }
                };
                return () => {
                    unsubscribe();
                    AppStore.saveToSharedStorage = origSave;
                };
            }, []);

            const syncIndicator = () => {
                const hasSupabase = !!AppStore._supabase;
                const configs = {
                    loading: { color: '#f59e0b', label: 'データ読込中...', animate: true },
                    syncing: { color: '#3b82f6', label: '同期中...', animate: true },
                    synced: { color: '#10b981', label: '同期完了', animate: false },
                    idle: { color: hasSupabase ? '#10b981' : '#94a3b8', label: hasSupabase ? 'Supabase接続済み' : 'ローカルのみ（Supabase未設定）', animate: false },
                    error: { color: '#ef4444', label: '同期エラー', animate: false },
                };
                const cfg = configs[syncStatus] || configs.idle;
                return (
                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.4rem', fontSize: '0.75rem', color: cfg.color }}>
                        <div style={{ width: '8px', height: '8px', borderRadius: '50%', background: cfg.color, animation: cfg.animate ? 'pulse 1s infinite' : 'none', flexShrink: 0 }}></div>
                        <span>{cfg.label}</span>
                        {lastSynced && syncStatus === 'idle' && hasSupabase && (
                            <span style={{ color: '#cbd5e1' }}>({lastSynced.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })})</span>
                        )}
                    </div>
                );
            };

            // 初期ロード中はスピナー表示
            if (AppStore.isLoading()) {
                return (
                    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100vh', gap: '1rem', background: '#f8fafc' }}>
                        <div style={{ width: '48px', height: '48px', border: '4px solid #e2e8f0', borderTopColor: 'var(--primary-color)', borderRadius: '50%', animation: 'spin 0.8s linear infinite' }}></div>
                        <div style={{ color: 'var(--text-muted)', fontSize: '0.875rem' }}>共有データを読み込んでいます...</div>
                        <div style={{ color: '#94a3b8', fontSize: '0.75rem' }}>初回起動時は少し時間がかかる場合があります</div>
                    </div>
                );
            }

            return (
                <div className="app-container">
                    <Navigation currentView={currentView} onViewChange={setCurrentView} />
                    <main className="main-content">
                        <header style={{ height: 'var(--header-height)', display: 'flex', alignItems: 'center', padding: '0 2rem', background: 'var(--surface-bg)', borderBottom: '1px solid var(--border-color)', justifyContent: 'space-between' }}>
                            <h2 style={{ margin: 0, fontSize: '1.125rem', fontWeight: 600 }}>
                                {currentView === 'dashboard' && 'ダッシュボード'}
                                {currentView === 'contracts' && '契約一覧'}
                                {currentView === 'new_contract' && '新規契約登録'}
                                {currentView === 'periodic' && '支払いリスト（定期）'}
                                {currentView === 'payments_planned' && '支払対象確認（スポット）'}
                                {currentView === 'history' && '法定調書'}
                                {currentView === 'payment_history_list' && '支払い履歴一覧'}
                                {currentView === 'admin' && '管理・マスタ設定'}
                            </h2>
                            <div style={{ display: 'flex', gap: '1rem', alignItems: 'center' }}>
                                {syncIndicator()}
                                <span style={{ fontSize: '0.875rem', color: 'var(--text-muted)' }}>{new Date().toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' })}</span>
                                <div style={{ width: '32px', height: '32px', borderRadius: '50%', background: '#e2e8f0', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>👤</div>
                            </div>
                        </header>

                        <div className="scrollable-area">
                            {currentView === 'dashboard' && <DashboardView onViewToggle={setCurrentView} />}
                            {currentView === 'contracts' && <ContractListView />}
                            {currentView === 'new_contract' && <NewContractView />}
                            {currentView === 'renew_contract' && <RenewContractView />}
                            {currentView === 'periodic' && <PeriodicPaymentView />}
                            {currentView === 'payments' && <SavedItemsView initialTab="spot" />}
                            {currentView === 'payments_planned' && <SavedItemsView initialTab="planned" />}
                            {currentView === 'history' && <StatutoryReportView />}
                            {currentView === 'payment_history_list' && <PaymentHistoryListView />}
                            {currentView === 'admin' && <AdminView onViewChange={setCurrentView} />}
                        </div>
                    </main>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>

</html>
