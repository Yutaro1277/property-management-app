<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Management App | Antigravity</title>

    <!-- React & Babel (CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            /* 新テーマ 25色 Color Palette */
            --c-b0c4de: #B0C4DE;
            --c-fabedc: #FABEDC;
            --c-f5eb4a: #F5EB4A;
            --c-4182fa: #4182FA;
            --c-ffdbfe: #FFDBFE;
            --c-c7b2d6: #C7B2D6;
            --c-ffffff: #FFFFFF;
            --c-fa96c8: #FA96C8;
            --c-d1de79: #D1DE79;
            --c-be2152: #BE2152;
            --c-ffd23c: #FFD23C;
            --c-85cab3: #85CAB3;
            --c-b4f1f9: #B4F1F9;
            --c-d6adff: #D6ADFF;
            --c-ff3652: #FF3652;
            --c-8eced9: #8ECED9;
            --c-fba03f: #FBA03F;
            --c-ff998d: #FF998D;
            --c-909ec8: #909EC8;
            --c-5195e1: #5195E1;
            --c-ed784a: #ED784A;
            --c-ea5506: #EA5506;
            --c-eca0aa: #ECA0AA;
            --c-58535e: #58535E;
            --c-beff77: #BEFF77;

            /* Base Semantic Colors */
            --primary-color: var(--c-4182fa);
            --primary-hover: var(--c-5195e1);
            --secondary-color: var(--c-909ec8);
            --background-bg: var(--c-ffffff);
            --sidebar-bg: var(--c-58535e);
            --sidebar-text: var(--c-ffffff);
            --sidebar-text-muted: var(--c-b0c4de);
            --sidebar-active-bg: rgba(255, 255, 255, 0.1);
            --sidebar-active-shadow: none;
            --surface-bg: var(--c-ffffff);
            --surface-glass: rgba(255, 255, 255, 0.95);
            --text-main: #333333;
            --text-muted: var(--c-909ec8);
            --border-color: var(--c-b0c4de);

            /* Shadows & Effects */
            --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --glass-blur: none;
            --radius-md: 0.5rem;
            --header-height: 64px;
            --sidebar-width: 260px;
        }

        body {
            margin: 0;
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--background-bg);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
        }

        #root {
            height: 100%;
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            background-color: var(--background-bg);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            background: transparent;
        }

        .scrollable-area {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
        }

        .glass-card {
            background: var(--surface-glass);
            backdrop-filter: var(--glass-blur);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            padding: 1.5rem;
            transition: transform 0.2s ease-in-out;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            box-shadow: 0 2px 4px rgba(37, 99, 235, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }

        .btn-outline:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .btn-danger {
            background: #dc2626;
            color: white;
            border: none;
        }

        .btn-danger:hover {
            background: #b91c1c;
            box-shadow: 0 2px 4px rgba(220, 38, 38, 0.3);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: var(--surface-bg);
            padding: 2rem;
            border-radius: var(--radius-md);
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow-md);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .form-label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .form-input,
        .form-select {
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            font-family: inherit;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- 1. MOCK DATA (Expanded with payment history fields) ---
        // ======================================================
        // サンプルデータなし — 全データはユーザーが登録する
        // CDマスタ・物件・ベンダー・支払履歴はCSVインポートまたは
        // 画面からの手入力で登録してください
        // ======================================================
        const mockCDMaster = [];
        const mockVendors = [];
        const mockContracts = [];
        const mockPayments = [];
        const mockPaymentHistory = [];

        // --- 2. Utils ---
        const toHalfWidthKana = (str) => {
            if (!str) return str;
            const map = {
                'ガ': 'ｶﾞ', 'ギ': 'ｷﾞ', 'グ': 'ｸﾞ', 'ゲ': 'ｹﾞ', 'ゴ': 'ｺﾞ',
                'ザ': 'ｻﾞ', 'ジ': 'ｼﾞ', 'ズ': 'ｽﾞ', 'ゼ': 'ｾﾞ', 'ゾ': 'ｿﾞ',
                'ダ': 'ﾀﾞ', 'ヂ': 'ﾁﾞ', 'ヅ': 'ﾂﾞ', 'デ': 'ﾃﾞ', 'ド': 'ﾄﾞ',
                'バ': 'ﾊﾞ', 'ビ': 'ﾋﾞ', 'ブ': 'ﾌﾞ', 'ベ': 'ﾍﾞ', 'ボ': 'ﾎﾞ',
                'パ': 'ﾊﾟ', 'ピ': 'ﾋﾟ', 'プ': 'ﾌﾟ', 'ペ': 'ﾍﾟ', 'ポ': 'ﾎﾟ',
                'ヴ': 'ｳﾞ', 'ヷ': 'ﾜﾞ', 'ヺ': 'ｦﾞ',
                'ア': 'ｱ', 'イ': 'ｲ', 'ウ': 'ｳ', 'エ': 'ｴ', 'オ': 'ｵ',
                'カ': 'ｶ', 'キ': 'ｷ', 'ク': 'ｸ', 'ケ': 'ｹ', 'コ': 'ｺ',
                'サ': 'ｻ', 'シ': 'ｼ', 'ス': 'ｽ', 'セ': 'ｾ', 'ソ': 'ｿ',
                'タ': 'ﾀ', 'チ': 'ﾁ', 'ツ': 'ﾂ', 'テ': 'ﾃ', 'ト': 'ﾄ',
                'ナ': 'ﾅ', 'ニ': 'ﾆ', 'ヌ': 'ﾇ', 'ネ': 'ﾈ', 'ノ': 'ﾉ',
                'ハ': 'ﾊ', 'ヒ': 'ﾋ', 'フ': 'ﾌ', 'ヘ': 'ﾍ', 'ホ': 'ﾎ',
                'マ': 'ﾏ', 'ミ': 'ﾐ', 'ム': 'ﾑ', 'メ': 'ﾒ', 'モ': 'ﾓ',
                'ヤ': 'ﾔ', 'ユ': 'ﾕ', 'ヨ': 'ﾖ',
                'ラ': 'ﾗ', 'リ': 'ﾘ', 'ル': 'ﾙ', 'レ': 'ﾚ', 'ロ': 'ﾛ',
                'ワ': 'ﾜ', 'ヲ': 'ｦ', 'ン': 'ﾝ',
                'ァ': 'ｧ', 'ィ': 'ｨ', 'ゥ': 'ｩ', 'ェ': 'ｪ', 'ォ': 'ｫ',
                'ッ': 'ｯ', 'ャ': 'ｬ', 'ュ': 'ｭ', 'ョ': 'ｮ',
                '。': '｡', '、': '､', 'ー': 'ｰ', '「': '｢', '」': '｣', '・': '･',
                // 全角括弧・記号
                '（': '(', '）': ')', '［': '[', '］': ']', '｛': '{', '｝': '}',
                '　': ' ', '－': '-', '＿': '_', '／': '/', '￥': '\\'
            };
            let res = '';
            for (let i = 0; i < str.length; i++) {
                const char = str[i];
                res += map[char] || char;
            }
            // 全角英数字・記号のみ半角に変換（U+FF01〜U+FF5E の範囲のみ）
            return res.replace(/[\uFF01-\uFF5E]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0))
                .replace(/\u3000/g, ' ');
        };


        // --- 2. STORE (Supabase対応版 - 全員共有・リアルタイム同期) ---
        // ★ 設計方針:
        //   - Supabase (PostgreSQL) → 全ユーザーで共有する唯一の真実ソース
        //   - Supabase Realtime → 他ユーザーの編集を即座に検知・反映
        //   - localStorage → 高速表示用キャッシュ（Supabaseが常に優先）
        //   - 編集履歴スナップショット → localStorage専用（DB肥大化防止）
        //   - 起動時: 必ず Supabase を待ってから表示（spinner表示中）

        // ★★★ Supabase 設定 ★★★
        // 以下の2つの値をSupabaseプロジェクトの値に置き換えてください
        // Supabase Dashboard → Settings → API から取得できます
        const SUPABASE_URL = 'https://dbumhckgzgdxsmhrpsyg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRidW1oY2tnemdkeHNtaHJwc3lnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODgwNzksImV4cCI6MjA4ODE2NDA3OX0.ShJ4H8qFZmaXqW7wupR2QW_ia4b6iBHJfct0iPAUueU';

        // Supabase クライアント初期化
        const _supabaseClient = (SUPABASE_URL !== 'YOUR_SUPABASE_URL_HERE' && SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY_HERE')
            ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
            : null;

        class Store {
            constructor() {
                this.listeners = [];
                this.lastSyncTimestamp = 0;
                this._isLoading = true;
                this._editHistory = [];
                this._savePending = false;
                this._saveDebounceTimer = null;
                this._supabase = _supabaseClient;

                // localStorage は起動時スピナー中のキャッシュ初期値のみに使用
                this._bootstrapFromLocalStorage();

                // Supabase から正式ロード（非同期）
                this._initSupabase();
            }

            // ローカルキャッシュから初期値セット（Supabaseロード前の仮データ）
            _bootstrapFromLocalStorage() {
                try {
                    this.contracts = JSON.parse(localStorage.getItem('property_contracts')) || [];
                    this.vendors = JSON.parse(localStorage.getItem('property_vendors')) || [];
                    this.masterData = JSON.parse(localStorage.getItem('property_masterData')) || [];
                    this.payments = JSON.parse(localStorage.getItem('property_payments')) || [];
                    this.savedItems = JSON.parse(localStorage.getItem('property_savedItems')) || [];
                    this.paymentHistory = JSON.parse(localStorage.getItem('property_paymentHistory')) || [];
                    this.deptMasters = JSON.parse(localStorage.getItem('property_deptMasters')) || [];
                    this._editHistory = JSON.parse(localStorage.getItem('property_editHistory')) || [];
                } catch (e) {
                    this.contracts = []; this.vendors = []; this.masterData = [];
                    this.payments = []; this.savedItems = []; this.paymentHistory = [];
                    this.deptMasters = []; this._editHistory = [];
                }
            }

            // ========== Supabase 初期化・リアルタイム同期 ==========
            async _initSupabase() {
                if (!this._supabase) {
                    // Supabase未設定: localStorageのみで動作
                    console.warn('Supabase未設定: SUPABASE_URL と SUPABASE_ANON_KEY を設定してください');
                    this._isLoading = false;
                    this._saveToLocalStorage();
                    this.listeners.forEach(l => l());
                    return;
                }
                try {
                    // Supabase からデータを読み込み
                    const loaded = await this._loadFromSupabase();
                    if (!loaded) {
                        // DB にデータがない → 初期データをアップロード
                        await this._saveToSupabase();
                    }
                    // リアルタイムサブスクリプション開始
                    this._subscribeRealtime();
                } catch (e) {
                    console.error('Supabase init failed:', e);
                } finally {
                    this._isLoading = false;
                    this._saveToLocalStorage();
                    this.listeners.forEach(l => l());
                }
            }

            // Supabase からデータを読み込み
            async _loadFromSupabase() {
                if (!this._supabase) return false;
                try {
                    const { data, error } = await this._supabase
                        .from('app_data')
                        .select('data, updated_at')
                        .eq('id', 'main')
                        .single();

                    if (error) {
                        console.error('Supabase load error:', error);
                        return false;
                    }
                    if (data && data.data) {
                        const d = data.data;
                        this.contracts = d.contracts || [];
                        this.vendors = d.vendors || [];
                        this.masterData = d.masterData || [];
                        this.payments = d.payments || [];
                        this.savedItems = d.savedItems || [];
                        this.paymentHistory = d.paymentHistory || [];
                        this.deptMasters = d.deptMasters || [];
                        this.lastSyncTimestamp = new Date(data.updated_at).getTime();
                        this._saveToLocalStorage();
                        return true;
                    }
                } catch (e) { console.error('Failed to load from Supabase:', e); }
                return false;
            }

            // Supabase にデータを保存 (デバウンス付き)
            async _saveToSupabase() {
                if (!this._supabase) return;
                // デバウンス: 短時間に連続保存しない (500ms)
                if (this._saveDebounceTimer) clearTimeout(this._saveDebounceTimer);
                this._savePending = true;
                return new Promise((resolve) => {
                    this._saveDebounceTimer = setTimeout(async () => {
                        try {
                            const payload = {
                                contracts: this.contracts,
                                vendors: this.vendors,
                                masterData: this.masterData,
                                payments: this.payments,
                                savedItems: this.savedItems,
                                paymentHistory: this.paymentHistory,
                                deptMasters: this.deptMasters
                            };
                            const { error } = await this._supabase
                                .from('app_data')
                                .upsert({ id: 'main', data: payload }, { onConflict: 'id' });
                            if (error) console.error('Supabase save error:', error);
                            this.lastSyncTimestamp = Date.now();
                        } catch (e) { console.error('Failed to save to Supabase:', e); }
                        this._savePending = false;
                        resolve();
                    }, 500);
                });
            }

            // リアルタイムサブスクリプション（他ユーザーの変更を即座に反映）
            _subscribeRealtime() {
                if (!this._supabase) return;
                this._supabase
                    .channel('app_data_changes')
                    .on('postgres_changes',
                        { event: 'UPDATE', schema: 'public', table: 'app_data', filter: 'id=eq.main' },
                        (payload) => {
                            // 自分が保存中の場合はスキップ
                            if (this._savePending) return;
                            const d = payload.new.data;
                            if (d) {
                                this.contracts = d.contracts || [];
                                this.vendors = d.vendors || [];
                                this.masterData = d.masterData || [];
                                this.payments = d.payments || [];
                                this.savedItems = d.savedItems || [];
                                this.paymentHistory = d.paymentHistory || [];
                                this.deptMasters = d.deptMasters || [];
                                this.lastSyncTimestamp = Date.now();
                                this._saveToLocalStorage();
                                this.listeners.forEach(l => l());
                            }
                        }
                    )
                    .subscribe();
            }

            // ========== 編集履歴 (localStorage専用 — スナップショット付き) ==========
            _recordHistory(action) {
                const entry = {
                    id: Date.now(),
                    timestamp: new Date().toISOString(),
                    action,
                    contractCount: this.contracts.length,
                    paymentHistoryCount: this.paymentHistory.length,
                    snapshot: {
                        contracts: JSON.parse(JSON.stringify(this.contracts)),
                        vendors: JSON.parse(JSON.stringify(this.vendors)),
                        masterData: JSON.parse(JSON.stringify(this.masterData)),
                        payments: JSON.parse(JSON.stringify(this.payments)),
                        savedItems: JSON.parse(JSON.stringify(this.savedItems || [])),
                        paymentHistory: JSON.parse(JSON.stringify(this.paymentHistory)),
                        deptMasters: JSON.parse(JSON.stringify(this.deptMasters || []))
                    }
                };
                this._editHistory = [entry, ...(this._editHistory || [])].slice(0, 30);
            }

            getEditHistory() { return this._editHistory || []; }

            restoreFromHistory(historyId) {
                const entry = (this._editHistory || []).find(h => h.id === historyId);
                if (!entry || !entry.snapshot) return false;
                const { snapshot } = entry;
                this.contracts = snapshot.contracts || [];
                this.vendors = snapshot.vendors || [];
                this.masterData = snapshot.masterData || [];
                this.payments = snapshot.payments || [];
                this.savedItems = snapshot.savedItems || [];
                this.paymentHistory = snapshot.paymentHistory || [];
                this.deptMasters = snapshot.deptMasters || [];
                this._recordHistory(`履歴復元 (${new Date(entry.timestamp).toLocaleString('ja-JP')})`);
                this._saveToLocalStorage();
                this._saveToSupabase();
                this.listeners.forEach(l => l());
                return true;
            }

            isLoading() { return this._isLoading; }

            // ========== ローカルストレージ (キャッシュ) ==========
            _saveToLocalStorage() {
                try {
                    localStorage.setItem('property_contracts', JSON.stringify(this.contracts));
                    localStorage.setItem('property_vendors', JSON.stringify(this.vendors));
                    localStorage.setItem('property_masterData', JSON.stringify(this.masterData));
                    localStorage.setItem('property_payments', JSON.stringify(this.payments));
                    localStorage.setItem('property_savedItems', JSON.stringify(this.savedItems));
                    localStorage.setItem('property_paymentHistory', JSON.stringify(this.paymentHistory));
                    localStorage.setItem('property_deptMasters', JSON.stringify(this.deptMasters || []));
                    // 編集履歴は別途保存（共有には含めない）
                    try { localStorage.setItem('property_editHistory', JSON.stringify(this._editHistory || [])); } catch { }
                } catch (e) { console.error('Failed to save to localStorage:', e); }
            }

            // ========== 通知 (データ変更時) ==========
            notify(actionDescription) {
                this._recordHistory(actionDescription || '更新');
                this._saveToLocalStorage();
                this._saveToSupabase();
                this.listeners.forEach(l => l());
            }

            // 後方互換: 旧コードから呼ばれる場合
            saveToSharedStorage(a) { return this._saveToSupabase(); }
            loadFromLocalStorage() { return this._bootstrapFromLocalStorage(); }
            saveToLocalStorage() { return this._saveToLocalStorage(); }

            subscribe(listener) {
                this.listeners.push(listener);
                return () => { this.listeners = this.listeners.filter(l => l !== listener); };
            }

            // ========== 部門CDマスタ CRUD ==========
            getDeptMasters() { return this.deptMasters || []; }

            generateDeptCd(empNo, deptName, type) {
                // 社員番号がある場合はそれをベース、なければ部署名の先頭文字をベース
                let prefix = '';
                if (type === 'name' && empNo) {
                    // 社員番号ベース: 半角英数字のみ抽出して先頭6文字
                    prefix = String(empNo).replace(/[^a-zA-Z0-9]/g, '').slice(0, 6).toUpperCase();
                } else if (deptName) {
                    // 部署名ベース: 先頭3文字をASCII変換（カタカナ→ローマ字マッピング）
                    const kanaRoma = {
                        'ア': 'A', 'イ': 'I', 'ウ': 'U', 'エ': 'E', 'オ': 'O',
                        'カ': 'KA', 'キ': 'KI', 'ク': 'KU', 'ケ': 'KE', 'コ': 'KO',
                        'サ': 'SA', 'シ': 'SI', 'ス': 'SU', 'セ': 'SE', 'ソ': 'SO',
                        'タ': 'TA', 'チ': 'TI', 'ツ': 'TU', 'テ': 'TE', 'ト': 'TO',
                        'ナ': 'NA', 'ニ': 'NI', 'ヌ': 'NU', 'ネ': 'NE', 'ノ': 'NO',
                        'ハ': 'HA', 'ヒ': 'HI', 'フ': 'FU', 'ヘ': 'HE', 'ホ': 'HO',
                        'マ': 'MA', 'ミ': 'MI', 'ム': 'MU', 'メ': 'ME', 'モ': 'MO',
                        'ヤ': 'YA', 'ユ': 'YU', 'ヨ': 'YO',
                        'ラ': 'RA', 'リ': 'RI', 'ル': 'RU', 'レ': 'RE', 'ロ': 'RO',
                        'ワ': 'WA', 'ヲ': 'WO', 'ン': 'NN',
                    };
                    prefix = deptName.split('').map(c => kanaRoma[c] || (c.match(/[a-zA-Z0-9]/) ? c.toUpperCase() : '')).join('').slice(0, 6);
                    if (!prefix) prefix = 'DEPT';
                }
                // 連番を付与（同じprefixで重複しない）
                const existing = (this.deptMasters || []).filter(d => d.deptCd.startsWith(prefix));
                const nums = existing.map(d => parseInt(d.deptCd.replace(prefix, '')) || 0);
                const nextNum = (nums.length > 0 ? Math.max(...nums) + 1 : 1).toString().padStart(3, '0');
                return `${prefix}${nextNum}`;
            }

            addDeptMaster(data) {
                const id = 'DM' + Date.now();
                const newRecord = { id, ...data };
                this.deptMasters = [...(this.deptMasters || []), newRecord];
                this.notify('部門CDマスタ追加');
                return newRecord;
            }

            updateDeptMaster(id, data) {

            // A-1: 新仕様: 業者種別プレフィックスなしで純粋な4桁数字で採番（現在の最大値+1）
            generateVendorMcd(vendorTypePrefix) {
                const existing = this.vendors.filter(v => v.vendorCd && /^\d{4}$/.test(v.vendorCd));
                let maxNum = 0;
                existing.forEach(v => {
                    const num = parseInt(v.vendorCd) || 0;
                    if (num > maxNum) maxNum = num;
                });
                return (maxNum + 1).toString().padStart(4, '0');

            generatePropertyMcd(propertyTypeCd) {
                // 採番ルール: 既存MCDの最大値+1
                // 住宅系 (区分=01/1): 1001〜9999 (4桁)
                // その他 (区分=2,3,...): 10001〜 (5桁)
                const isHousing = propertyTypeCd === '1' || propertyTypeCd === '01';
                const mcds = this.contracts.map(c => parseInt(c.propertyMcd) || 0);

                if (isHousing) {
                    const housingMcds = mcds.filter(m => m >= 1000 && m < 10000);
                    const max = housingMcds.length > 0 ? Math.max(...housingMcds) : 1000;
                    return (max + 1).toString().padStart(4, '0');
                } else {
                    const otherMcds = mcds.filter(m => m >= 10000);
                    const max = otherMcds.length > 0 ? Math.max(...otherMcds) : 10000;
                    return (max + 1).toString().padStart(5, '0');
                }

            exportToCSV(type) {
                let data = [];
                let headers = [];

                if (type === 'property') {
                    // A-6: ヘッダーのみ出力（新規契約で入力する全フィールド）
                    data = [];
                    headers = [
                        'propertyMcd', 'propertyName', 'propertyTypeCd',

                        'userName', 'userEmpNo', 'userDeptCd', 'userDeptName',

                    ];
                } else if (type === 'vendor') {
                    // A-7: ヘッダーのみ出力（業者マスタのフィールド）
                    data = [];
                    headers = [
                        'propertyMcd', 'vendorCd', 'name', 'nameKana', 'entityType', 'vendorType',
                        'tel', 'fax', 'email', 'postalCode', 'address', 'building',
                        'contactPerson', 'contactTel',
                        'bankNameKana', 'branchNameKana', 'accountTypeCd',
                        'accountNumber', 'accountNameKana',
                        'isLatest', 'version', 'updatedAt'
                    ];
                } else if (type === 'cd_master') {
                    data = this.masterData;
                    headers = Object.keys(data[0] || {});
                } else if (type === 'payment_history') {
                    // A-8: ヘッダーのみ出力
                    data = [];
                    headers = [
                        'id', 'date', 'propertyMcd', 'accountCd', 'subCd', 'amount',
                        'purpose', 'purposeCode', 'paymentMethod', 'paymentMethodName',
                        'recipientType', 'recipientName', 'recipientCd', 'recipientEntityType',
                        'bankName', 'branchName', 'accountType', 'accountNumber', 'accountName',
                        'statutoryFlag', 'remarks'
                    ];
                } else if (type === 'dept_master') {
                    data = this.deptMasters || [];
                    // A-5: 列順変更・empName追加
                    headers = ['deptCd', 'deptName', 'empNo', 'empName'];
                }

                const csvRows = [];
                // ヘッダー行にBOM付与不要（呼び出し元でBOM付与）
                csvRows.push(headers.join(','));
                for (const row of data) {
                    const values = headers.map(header => {
                        let val;
                        if (['bankName', 'branchName', 'accountType', 'accountNumber', 'accountName'].includes(header)) {
                            val = row.bankInfo ? row.bankInfo[header] : '';
                        } else {
                            val = row[header];
                        }
                        return `"${(val === undefined || val === null) ? '' : String(val).replace(/"/g, '""')}"`;
                    });
                    csvRows.push(values.join(','));
                }
                return csvRows.join('\n');
            }

            importFromCSV(type, csvText) {
                const lines = csvText.split(/\r?\n/).filter(line => line.trim());
                if (lines.length < 2) return { added: 0, updated: 0, errors: ['データが空かヘッダーのみです'] };

                const separator = lines[0].includes('\t') ? '\t' : ',';
                const headers = lines[0].split(separator).map(h => h.trim().replace(/^"|"$/g, ''));
                const results = { added: 0, updated: 0, errors: [] };

                for (let i = 1; i < lines.length; i++) {
                    const values = lines[i].split(separator).map(v => v.trim().replace(/^"|"$/g, ''));
                    if (values.length < headers.length && type !== 'dept_master') {
                        results.errors.push(`行 ${i + 1}: 列数が足りません`);
                        continue;
                    }

                    const record = {};
                    headers.forEach((header, index) => {
                        record[header] = values[index] !== undefined ? values[index] : '';
                    });

                    try {
                        if (type === 'property') {
                            const existingIdx = this.contracts.findIndex(c => c.propertyMcd === record.propertyMcd);
                            if (existingIdx >= 0) {
                                this.contracts[existingIdx] = { ...this.contracts[existingIdx], ...record };
                                results.updated++;
                            } else {
                                this.contracts.push({ id: 'CSV_' + Date.now() + '_' + i, ...record, status: record.status || 'active' });
                                results.added++;
                            }
                        } else if (type === 'vendor') {
                            const existingIdx = this.vendors.findIndex(v => v.vendorCd === record.vendorCd);
                            if (existingIdx >= 0) {
                                this.vendors[existingIdx] = { ...this.vendors[existingIdx], ...record };
                                results.updated++;
                            } else {
                                this.vendors.push(record);
                                results.added++;
                            }
                        } else if (type === 'cd_master') {
                            const existingIdx = this.masterData.findIndex(m => m.category === record.category && m.code === record.code);
                            if (existingIdx >= 0) {
                                this.masterData[existingIdx] = { ...this.masterData[existingIdx], ...record };
                                results.updated++;
                            } else {
                                this.masterData.push(record);
                                results.added++;
                            }
                        } else if (type === 'payment_history') {
                            this.paymentHistory.push({ id: 'PH_' + Date.now() + '_' + i, ...record });
                            results.added++;
                        } else if (type === 'dept_master') {
                            const existingIdx = (this.deptMasters || []).findIndex(d =>
                                (record.empNo && d.empNo === record.empNo) ||
                                (record.deptName && d.deptName === record.deptName) ||
                                (d.deptCd === record.deptCd)
                            );
                            if (existingIdx >= 0) {
                                this.deptMasters[existingIdx] = { ...this.deptMasters[existingIdx], ...record, id: this.deptMasters[existingIdx].id };
                                results.updated++;
                            } else {
                                this.deptMasters = [...(this.deptMasters || []), { id: 'DM_' + Date.now() + '_' + i, ...record }];
                                results.added++;
                            }
                        }
                    } catch (err) {
                        results.errors.push(`行 ${i + 1}: ${err.message}`);
                    }
                }
                this.notify();
                return results;
            }

            // 銀行コードから銀行名を検索（全銀データはローカルに持たないためnullを返す）
            lookupBankName(bankCd) {
                const banks = {
                    '0001': 'ﾐｽﾞﾎ', '0005': 'ﾐﾂﾋﾞｼUFJ', '0009': 'ﾐﾂｲｽﾐﾄﾓ', '0010': 'ﾘｿﾅ', '0017': 'ｻｲﾀﾏﾘｿﾅ',

                };
                return banks[bankCd] || null;
            }

            lookupBranchName(bankCd, branchCd) {
                // Simplified mockup logic
                if (bankCd === '0005') {
                    const branches = { '001': 'ﾎﾝﾃﾝ', '231': 'ｼﾝｼﾞｭｸ', '616': 'ｼﾌﾞﾔ' };
                    return branches[branchCd] || null;
                }
                return null;
            }

            // Lookup Bank Code by Name (Kana)
            lookupBankCdByName(name) {
                const banks = {
                    'ﾐｽﾞﾎ': '0001', 'ﾐﾂﾋﾞｼ': '0005', 'ﾐﾂﾋﾞｼUFJ': '0005', 'MUFG': '0005', 'ﾐﾂUI': '0009', 'ﾐﾂｲｽﾐﾄﾓ': '0009', 'SMBC': '0009',
                    'ﾘｿﾅ': '0010', 'ｻｲﾀﾏﾘｿﾅ': '0017', 'ﾗｸﾃﾝ': '0036', 'SBI': '0038', 'ｱｳ': '0039', 'ﾍﾟｲﾍﾟｲ': '0040'
                };
                const normalized = this.toHalfWidthKana(name);
                for (const [key, cd] of Object.entries(banks)) {
                    if (normalized.includes(this.toHalfWidthKana(key)) || this.toHalfWidthKana(key).includes(normalized)) {
                        return cd;
                    }
                }
                return null;
            }

            // 全角カタカナを半角カタカナに変換するユーティリティ
            toHalfWidthKana(str) {
                if (!str) return "";
                const kanaMap = {
                    'ガ': 'ｶﾞ', 'ギ': 'ｷﾞ', 'グ': 'ｸﾞ', 'ゲ': 'ｹﾞ', 'ゴ': 'ｺﾞ',
                    'ザ': 'ｻﾞ', 'ジ': 'ｼﾞ', 'ズ': 'ｽﾞ', 'ゼ': 'ｾﾞ', 'ゾ': 'ｿﾞ',

                    'ア': 'ｱ', 'イ': 'ｲ', 'ウ': 'ｳ', 'エ': 'ｴ', 'オ': 'ｵ',
                    'カ': 'ｶ', 'キ': 'ｷ', 'ク': 'ｸ', 'ケ': 'ｹ', 'コ': 'ｺ',
                    'サ': 'ｻ', 'シ': 'ｼ', 'ス': 'ｽ', 'セ': 'ｾ', 'ソ': 'ｿ',
                    'タ': 'ﾀ', 'チ': 'ﾁ', 'ツ': 'ﾂ', 'テ': 'ﾃ', 'ト': 'ﾄ',
                    'ナ': 'ﾅ', 'ニ': 'ﾆ', 'ヌ': 'ﾇ', 'ネ': 'ﾈ', 'ノ': 'ﾉ',
                    'ハ': 'ﾊ', 'ヒ': 'ﾋ', 'フ': 'ﾌ', 'ヘ': 'ﾍ', 'ホ': 'ﾎ',
                    'マ': 'ﾏ', 'ミ': 'ﾐ', 'ム': 'ﾑ', 'メ': 'ﾒ', 'モ': 'ﾓ',
                    'ヤ': 'ﾔ', 'ユ': 'ﾕ', 'ヨ': 'ﾖ',
                    'ラ': 'ﾗ', 'リ': 'ﾘ', 'ル': 'ﾙ', 'レ': 'ﾚ', 'ロ': 'ﾛ',
                    'ワ': 'ﾜ', 'ヲ': 'ｦ', 'ン': 'ﾝ',
                    'ァ': 'ｧ', 'ィ': 'ｨ', 'ゥ': 'ｩ', 'ェ': 'ｪ', 'ォ': 'ｫ',
                    'ッ': 'ｯ', 'ャ': 'ｬ', 'ュ': 'ｭ', 'ョ': 'ｮ',
                    '。': '｡', '、': '､', 'ー': 'ｰ', '「': '｢', '」': '｣', '・': '･'
                };
                const reg = new RegExp('(' + Object.keys(kanaMap).join('|') + ')', 'g');
                let res = str.replace(reg, match => kanaMap[match])
                    .replace(/[！-～]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0))
                    .replace(/ /g, "");
                return res;
            }

                                <label className="form-label" style={{ fontSize: '0.7rem' }}>連絡先</label>

                        <div style={{ padding: '0.75rem', background: '#f0f9ff', borderRadius: '0.4rem', marginTop: '0.5rem' }}>

                                                    <td style={{ padding: '0.5rem' }}>{h.newVal}</td>
                                                    <td style={{ padding: '0.5rem' }}>{h.reason}</td>
                                                </tr>
                                            ))}
                                            {(!property.updateHistory || property.updateHistory.length === 0) && <tr><td colSpan="5" style={{ textAlign: 'center', padding: '1rem' }}>履歴なし</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                            {activeTab === 'docs' && (
                                <DocumentUploadSection property={property} store={store} />
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const DocumentUploadSection = ({ property, store }) => {
            const [isDragging, setIsDragging] = React.useState(false);
            const fileInputRef = React.useRef(null);

            const handleDragOver = (e) => {
                e.preventDefault();
                setIsDragging(true);
            };

            const handleDragLeave = (e) => {
                e.preventDefault();
                setIsDragging(false);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setIsDragging(false);
                const files = Array.from(e.dataTransfer.files);
                handleFiles(files);
            };

            const handleFileSelect = (e) => {
                const files = Array.from(e.target.files);
                handleFiles(files);
            };

            const handleFiles = (files) => {
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        store.addDocument(property.id, {
                            name: file.name,
                            type: file.type,
                            size: file.size,
                            dataUrl: e.target.result
                        });
                    };
                    reader.readAsDataURL(file);
                });
            };

            const handleDelete = (docId) => {
                if (confirm('この書類を削除しますか?')) {
                    store.deleteDocument(property.id, docId);
                }
            };

            const handleDownload = (doc) => {
                if (doc.dataUrl) {
                    const link = document.createElement('a');
                    link.href = doc.dataUrl;
                    link.download = doc.name;
                    link.click();
                }
            };

            return (
                <div>
                    <div
                        onDragOver={handleDragOver}
                        onDragLeave={handleDragLeave}
                        onDrop={handleDrop}
                        style={{
                            border: `2px dashed ${isDragging ? 'var(--primary-color)' : 'var(--border-color)'}`,
                            borderRadius: '0.75rem',
                            padding: '2rem',
                            textAlign: 'center',
                            background: isDragging ? 'rgba(79, 70, 229, 0.05)' : '#f8fafc',
                            marginBottom: '1.5rem',
                            cursor: 'pointer',
                            transition: 'all 0.2s'
                        }}
                        onClick={() => fileInputRef.current?.click()}
                    >
                        <div style={{ fontSize: '3rem', marginBottom: '0.5rem' }}>📁</div>
                        <div style={{ fontSize: '1rem', fontWeight: 600, marginBottom: '0.5rem' }}>
                            ファイルをドラッグ&ドロップ
                        </div>
                        <div style={{ fontSize: '0.875rem', color: 'var(--text-muted)' }}>
                            または クリックしてファイルを選択
                        </div>
                        <input
                            ref={fileInputRef}
                            type="file"
                            multiple
                            onChange={handleFileSelect}
                            style={{ display: 'none' }}
                            accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png"
                        />
                    </div>

                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))', gap: '1rem' }}>
                        {(property.documents || []).map(d => (
                            <div key={d.id} style={{
                                border: '1px solid var(--border-color)',
                                borderRadius: '0.5rem',
                                padding: '1rem',
                                background: 'white',
                                display: 'flex',
                                flexDirection: 'column',
                                gap: '0.5rem'
                            }}>
                                <div style={{ fontSize: '2rem', textAlign: 'center' }}>
                                    {d.name.endsWith('.pdf') ? '📄' : d.name.match(/\.(jpg|jpeg|png)$/i) ? '🖼️' : '📋'}
                                </div>
                                <div style={{ fontSize: '0.875rem', fontWeight: 600, wordBreak: 'break-word' }}>{d.name}</div>
                                <div style={{ fontSize: '0.75rem', color: 'var(--text-muted)' }}>
                                    {d.size ? `${(d.size / 1024).toFixed(1)} KB` : '-'}
                                </div>
                                <div style={{ display: 'flex', gap: '0.5rem', marginTop: '0.5rem' }}>
                                    <button
                                        className="btn btn-outline"
                                        style={{ flex: 1, fontSize: '0.75rem', padding: '0.25rem' }}
                                        onClick={() => handleDownload(d)}
                                    >
                                        ダウンロード
                                    </button>
                                    <button
                                        className="btn btn-outline"
                                        style={{ fontSize: '0.75rem', padding: '0.25rem', color: '#dc2626' }}
                                        onClick={() => handleDelete(d.id)}
                                    >
                                        削除
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>

                    {(!property.documents || property.documents.length === 0) && (
                        <div style={{ textAlign: 'center', color: 'var(--text-muted)', padding: '2rem' }}>
                            書類がアップロードされていません
                        </div>
                    )}
                </div>
            );
        };



        // 支払い履歴一覧コンポーネント
        const PaymentHistoryListView = () => {
            const store = useStore(AppStore);
            const [searchTerm, setSearchTerm] = React.useState('');
            const [selectedType, setSelectedType] = React.useState('all');
            const [isModalOpen, setIsModalOpen] = React.useState(false);
            const [editingPayment, setEditingPayment] = React.useState(null);
            const [isImportModalOpen, setIsImportModalOpen] = React.useState(false);
            const [selectedPayments, setSelectedPayments] = React.useState(new Set());
            const [showDeleteConfirm, setShowDeleteConfirm] = React.useState(false);

            const paymentHistory = store.getAllPaymentHistory();
            const contracts = store.getAllContracts();

            const filteredPayments = paymentHistory.filter(p => {
                const matchesSearch = !searchTerm ||
                    String(p.propertyMcd || '').includes(searchTerm) ||
                    String(p.payeeName || p.recipientName || '').includes(searchTerm) ||
                    String(p.purpose || '').includes(searchTerm);

                const matchesType = selectedType === 'all' ||
                    (selectedType === 'statutory' && p.statutoryFlag) ||
                    (selectedType === 'non-statutory' && !p.statutoryFlag);

                return matchesSearch && matchesType;
            });

            const getPropertyName = (propertyMcd) => {
                const contract = contracts.find(c => c.propertyMcd === propertyMcd);
                return contract ? contract.propertyName : propertyMcd;
            };

            const getRecipientTypeName = (type) => {
                switch (type) {
                    case 'landlord': return '貸主';
                    case 'management': return '管理会社';
                    case 'broker': return '仲介会社';
                    case 'other': return 'その他';
                    default: return type || '-';
                }
            };

            const toggleSelectPayment = (id) => {
                setSelectedPayments(prev => {
                    const next = new Set(prev);
                    if (next.has(id)) next.delete(id);
                    else next.add(id);
                    return next;
                });
            };

            const toggleSelectAll = () => {
                if (selectedPayments.size === filteredPayments.length) {
                    setSelectedPayments(new Set());
                } else {
                    setSelectedPayments(new Set(filteredPayments.map(p => p.id)));
                }
            };

            const handleDeleteSelected = () => {
                selectedPayments.forEach(id => store.deletePaymentHistory(id));
                setSelectedPayments(new Set());
                setShowDeleteConfirm(false);
            };

            const handleExportCSV = () => {
                const csvData = store.exportToCSV('payment_history');
                const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
                const blob = new Blob([bom, csvData], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", `payment_history_${new Date().toISOString().split('T')[0]}.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <div className="glass-card">
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
                        <h3 style={{ margin: 0 }}>支払い履歴管理</h3>
                        <div style={{ display: 'flex', gap: '1rem' }}>
                            <button className="btn btn-outline" onClick={() => setIsImportModalOpen(true)}>CSVインポート</button>
                            <button className="btn btn-outline" onClick={handleExportCSV}>CSVエクスポート</button>
                            <button className="btn btn-primary" onClick={() => { setEditingPayment(null); setIsModalOpen(true); }}>+ 新規登録</button>
                        </div>
                    </div>

                    <div style={{ display: 'flex', gap: '1rem', marginBottom: '1.5rem', flexWrap: 'wrap' }}>
                        <div className="form-group" style={{ flex: '1 1 300px', margin: 0 }}>
                            <input
                                type="text"
                                className="form-input"
                                placeholder="MCD、支払先名、目的で検索..."
                                value={searchTerm}
                                onChange={e => setSearchTerm(e.target.value)}
                            />
                        </div>
                        <div className="form-group" style={{ flex: '0 0 150px', margin: 0 }}>
                            <select className="form-select" value={selectedType} onChange={e => setSelectedType(e.target.value)}>
                                <option value="all">すべて</option>
                                <option value="statutory">法定調書対象</option>
                                <option value="non-statutory">法定調書対象外</option>
                            </select>
                        </div>
                        {selectedPayments.size > 0 && (
                            <button className="btn btn-danger" onClick={() => setShowDeleteConfirm(true)}>
                                {selectedPayments.size}件を削除
                            </button>
                        )}
                    </div>

                    <div style={{ overflowX: 'auto' }}>
                        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.875rem' }}>
                            <thead>
                                <tr style={{ borderBottom: '2px solid var(--border-color)', color: 'var(--text-muted)', background: '#f8fafc' }}>
                                    <th style={{ padding: '0.75rem', textAlign: 'center', width: '50px' }}>
                                        <input
                                            type="checkbox"
                                            checked={selectedPayments.size === filteredPayments.length && filteredPayments.length > 0}
                                            onChange={toggleSelectAll}
                                        />
                                    </th>
                                    <th style={{ padding: '0.75rem', textAlign: 'left' }}>支払日</th>
                                    <th style={{ padding: '0.75rem', textAlign: 'left' }}>物件MCD</th>
                                    <th style={{ padding: '0.75rem', textAlign: 'left' }}>物件名</th>
                                    <th style={{ padding: '0.75rem', textAlign: 'left' }}>科目/補助</th>
                                    <th style={{ padding: '0.75rem', textAlign: 'left' }}>目的</th>
                                    <th style={{ padding: '0.75rem', textAlign: 'right' }}>金額</th>
                                    <th style={{ padding: '0.75rem', textAlign: 'left' }}>支払先</th>
                                    <th style={{ padding: '0.75rem', textAlign: 'center' }}>法定調書</th>
                                    <th style={{ padding: '0.75rem', textAlign: 'center' }}>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filteredPayments.map(p => (
                                    <tr key={p.id} style={{ borderBottom: '1px solid var(--border-color)' }}>
                                        <td style={{ padding: '0.75rem', textAlign: 'center' }}>
                                            <input
                                                type="checkbox"
                                                checked={selectedPayments.has(p.id)}
                                                onChange={() => toggleSelectPayment(p.id)}
                                            />
                                        </td>
                                        <td style={{ padding: '0.75rem' }}>{p.date}</td>
                                        <td style={{ padding: '0.75rem' }}>{p.propertyMcd}</td>
                                        <td style={{ padding: '0.75rem' }}>{getPropertyName(p.propertyMcd)}</td>
                                        <td style={{ padding: '0.75rem' }}>
                                            <div style={{ fontSize: '0.75rem' }}>{p.accountCd || '-'}</div>
                                            <div style={{ fontSize: '0.75rem', color: 'var(--text-muted)' }}>{p.subCd || '-'}</div>
                                        </td>
                                        <td style={{ padding: '0.75rem' }}>{p.purpose}</td>
                                        <td style={{ padding: '0.75rem', textAlign: 'right', fontWeight: 'bold' }}>¥{p.amount.toLocaleString()}</td>
                                        <td style={{ padding: '0.75rem' }}>
                                            <div style={{ fontWeight: 500 }}>{p.payeeName || p.recipientName}</div>
                                            <div style={{ fontSize: '0.75rem', color: 'var(--text-muted)' }}>{p.payeeEntityType === 'individual' ? '個人' : p.payeeEntityType === 'corporate' ? '法人' : (p.recipientEntityType === 'individual' ? '個人' : p.recipientEntityType === 'corporate' ? '法人' : '-')}</div>
                                        </td>
                                        <td style={{ padding: '0.75rem' }}>
                                            {p.statutoryFlag ?
                                                <span style={{ color: 'var(--primary-color)', background: '#e0e7ff', padding: '0.2rem 0.6rem', borderRadius: '4px', fontSize: '0.75rem', fontWeight: 'bold' }}>対象</span> :
                                                <span style={{ color: '#94a3b8' }}>-</span>
                                            }
                                        </td>
                                        <td style={{ padding: '0.75rem', textAlign: 'center' }}>
                                            <button
                                                className="btn btn-outline"
                                                style={{ fontSize: '0.75rem', padding: '0.25rem 0.5rem' }}
                                                onClick={() => { setEditingPayment(p); setIsModalOpen(true); }}
                                            >
                                                詳細
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                                {filteredPayments.length === 0 && (
                                    <tr>
                                        <td colSpan="10" style={{ padding: '2rem', textAlign: 'center', color: 'var(--text-muted)' }}>
                                            支払い履歴がありません
                                        </td>
                                    </tr>
                                )}
                            </tbody>
                        </table>
                    </div>

                    {isImportModalOpen && (
                        <ImportCSVModal
                            importType="payment_history"
                            onClose={() => setIsImportModalOpen(false)}
                            store={store}
                        />
                    )}

                    {isModalOpen && (
                        <PaymentHistoryEditModal
                            payment={editingPayment}
                            contracts={contracts}
                            store={store}
                            onClose={() => { setIsModalOpen(false); setEditingPayment(null); }}
                            onSave={(data) => {
                                if (editingPayment) {
                                    store.updatePaymentHistory(editingPayment.id, data);
                                } else {
                                    store.addPaymentHistory(data);
                                }
                                setIsModalOpen(false);
                                setEditingPayment(null);
                            }}
                        />
                    )}

                    {showDeleteConfirm && (
                        <div className="modal-overlay" onClick={() => setShowDeleteConfirm(false)}>
                            <div className="modal-content" onClick={e => e.stopPropagation()}>
                                <h3 style={{ marginTop: 0 }}>選択した支払い履歴を削除しますか？</h3>
                                <p style={{ color: 'var(--text-muted)', marginBottom: '2rem' }}>
                                    {selectedPayments.size}件の支払い履歴を削除します。この操作は元に戻せません。
                                </p>
                                <div style={{ display: 'flex', gap: '1rem', justifyContent: 'flex-end' }}>
                                    <button className="btn btn-outline" onClick={() => setShowDeleteConfirm(false)}>キャンセル</button>
                                    <button className="btn btn-danger" onClick={handleDeleteSelected}>削除する</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // 支払い履歴編集モーダル
        const PaymentHistoryEditModal = ({ payment, contracts, store, onClose, onSave }) => {
            // マスタから勘定科目データを取得
            const acctMaster = store.getMasterDataByCategory('ACCT');
            // ユニークな勘定科目コード一覧
            const acctCodes = [...new Map(acctMaster.map(a => [a.code, a])).values()];

            const [formData, setFormData] = React.useState(payment || {
                propertyMcd: '',
                date: new Date().toISOString().split('T')[0],
                accountCd: '',
                subCd: '',
                amount: 0,
                purpose: '',
                paymentMethod: '01',
                paymentMethodName: '振込',
                payeeName: '',
                payeeEntityType: '',
                bankInfo: { bankName: '', branchName: '', accountType: '普通', accountNumber: '', accountName: '' },
                statutoryFlag: false,
                remarks: ''
            });

            // 選択された勘定科目CDに対応する補助コード一覧
            const subCodes = acctMaster.filter(a => a.code === formData.accountCd);

            // 勘定科目CD変更時の処理
            const handleAccountCdChange = (code) => {
                const acct = acctMaster.find(a => a.code === code);
                const firstSub = acctMaster.filter(a => a.code === code)[0];
                setFormData(prev => ({
                    ...prev,
                    accountCd: code,
                    subCd: firstSub ? firstSub.subCode : '',
                    purpose: firstSub ? firstSub.subName : (acct ? acct.name : prev.purpose)
                }));
            };

            // 補助CD変更時の処理
            const handleSubCdChange = (subCode) => {
                const sub = acctMaster.find(a => a.code === formData.accountCd && a.subCode === subCode);
                setFormData(prev => ({
                    ...prev,
                    subCd: subCode,
                    purpose: sub ? sub.subName : prev.purpose
                }));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                onSave({ ...formData });
            };

            return (
                <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
                    <div className="modal-content" style={{ maxWidth: '600px', maxHeight: '90vh', overflowY: 'auto' }} onClick={e => e.stopPropagation()}>
                        <h3 style={{ marginTop: 0 }}>{payment ? '支払い履歴の編集' : '新規支払い履歴の登録'}</h3>
                        <form onSubmit={handleSubmit}>
                            <div className="form-group">
                                <label className="form-label">物件MCD *</label>
                                <select className="form-select" value={formData.propertyMcd} onChange={e => setFormData({ ...formData, propertyMcd: e.target.value })} required>
                                    <option value="">選択してください</option>
                                    {contracts.map(c => (
                                        <option key={c.propertyMcd} value={c.propertyMcd}>{c.propertyMcd} - {c.propertyName}</option>
                                    ))}
                                </select>
                            </div>

                            <div className="form-group">
                                <label className="form-label">支払日 *</label>
                                <input type="date" className="form-input" value={formData.date} onChange={e => setFormData({ ...formData, date: e.target.value })} required />
                            </div>

                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem' }}>
                                <div className="form-group">
                                    <label className="form-label">勘定科目CD</label>
                                    <select className="form-select" value={formData.accountCd} onChange={e => handleAccountCdChange(e.target.value)}>
                                        <option value="">選択してください</option>
                                        {acctCodes.map(a => (
                                            <option key={a.code} value={a.code}>{a.code} - {a.name}</option>
                                        ))}
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">補助CD</label>
                                    <select className="form-select" value={formData.subCd} onChange={e => handleSubCdChange(e.target.value)} disabled={!formData.accountCd || subCodes.length === 0}>
                                        <option value="">選択してください</option>
                                        {subCodes.map(s => (
                                            <option key={s.subCode} value={s.subCode}>{s.subCode} - {s.subName}</option>
                                        ))}
                                    </select>
                                </div>
                            </div>

                            <div className="form-group">
                                <label className="form-label">金額 *</label>
                                <input type="number" className="form-input" value={formData.amount} onChange={e => setFormData({ ...formData, amount: parseInt(e.target.value) })} required min="0" />
                            </div>

                            <div className="form-group">
                                <label className="form-label">支払目的</label>
                                <input type="text" className="form-input" value={formData.purpose} onChange={e => setFormData({ ...formData, purpose: e.target.value })} placeholder="勘定科目・補助CDを選択すると自動入力されます" />
                            </div>

                            <div className="form-group">
                                <label className="form-label">法定調書</label>
                                <select className="form-select" value={formData.statutoryFlag ? 'true' : 'false'} onChange={e => setFormData({ ...formData, statutoryFlag: e.target.value === 'true' })}>
                                    <option value="false">対象外</option>
                                    <option value="true">対象</option>
                                </select>
                            </div>

                            <div className="form-group">
                                <label className="form-label">支払先</label>
                                <input type="text" className="form-input" value={formData.payeeName || formData.recipientName || ''} onChange={e => setFormData({ ...formData, payeeName: e.target.value, recipientName: e.target.value })} />
                            </div>

                            <div className="form-group">
                                <label className="form-label">個法判別</label>
                                <select className="form-select" value={formData.payeeEntityType || formData.recipientEntityType || ''} onChange={e => setFormData({ ...formData, payeeEntityType: e.target.value, recipientEntityType: e.target.value })}>
                                    <option value="">未設定</option>
                                    <option value="individual">個人</option>
                                    <option value="corporate">法人</option>
                                </select>
                            </div>

                            <div style={{ background: '#f0f9ff', padding: '1rem', borderRadius: '0.5rem', marginBottom: '1rem' }}>
                                <div style={{ fontWeight: 'bold', fontSize: '0.875rem', marginBottom: '0.75rem', color: '#1e40af' }}>振込先口座情報</div>
                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0.75rem' }}>
                                    <div className="form-group">
                                        <label className="form-label">銀行名 (半角カナ)</label>
                                        <BankSearchInput
                                            mode="bank"
                                            value={formData.bankInfo?.bankName || ''}
                                            onSelect={({ name, code }) => setFormData(prev => ({ ...prev, bankInfo: { ...prev.bankInfo, bankName: name, bankCd: code || prev.bankInfo?.bankCd || '' } }))}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">銀行CD</label>
                                        <input type="text" className="form-input" value={formData.bankInfo?.bankCd || ''} onChange={e => setFormData(prev => ({ ...prev, bankInfo: { ...prev.bankInfo, bankCd: e.target.value } }))} placeholder="例: 0005" maxLength="4" />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">支店名 (半角カナ)</label>
                                        <BankSearchInput
                                            mode="branch"
                                            value={formData.bankInfo?.branchName || ''}
                                            bankCode={formData.bankInfo?.bankCd}
                                            onSelect={({ name, code }) => setFormData(prev => ({ ...prev, bankInfo: { ...prev.bankInfo, branchName: name, branchCd: code || prev.bankInfo?.branchCd || '' } }))}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">支店CD</label>
                                        <input type="text" className="form-input" value={formData.bankInfo?.branchCd || ''} onChange={e => setFormData(prev => ({ ...prev, bankInfo: { ...prev.bankInfo, branchCd: e.target.value } }))} placeholder="例: 001" maxLength="3" />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">口座番号</label>
                                        <input type="text" className="form-input" value={formData.bankInfo?.accountNumber || ''} onChange={e => setFormData({ ...formData, bankInfo: { ...formData.bankInfo, accountNumber: e.target.value } })} />
                                    </div>

        // 法定調書出力コンポーネント
        const StatutoryReportView = () => {
            const store = useStore(AppStore);
            const [year, setYear] = React.useState(new Date().getFullYear());
            const [reportType, setReportType] = React.useState('all');
            const [generating, setGenerating] = React.useState(false);

            const paymentHistory = store.getAllPaymentHistory();

            // 指定年の支払い履歴を取得
            const yearlyPayments = paymentHistory.filter(p => {
                const paymentYear = new Date(p.date).getFullYear();
                return paymentYear === year;
            });

            // 法定調書対象のみフィルタリング
            const statutoryPayments = yearlyPayments.filter(p => p.statutoryFlag);

            const generateReport = () => {
                setGenerating(true);

                // 法定調書のテンプレートを生成
                let report = "＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝\n";
                report += "                    法定調書\n";
                report += "＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝\n\n";
                report += `発行日: ${new Date().toLocaleDateString('ja-JP')}\n`;
                report += `対象期間: ${year}年1月1日 〜 ${year}年12月31日\n`;
                report += `対象件数: ${statutoryPayments.length}件\n`;
                report += "=".repeat(70) + "\n\n";

                // 支払先ごとにグループ化
                const groupedByRecipient = {};
                statutoryPayments.forEach(p => {
                    const key = `${p.recipientName}_${p.recipientType}`;
                    if (!groupedByRecipient[key]) {
                        groupedByRecipient[key] = {
                            recipientName: p.recipientName,
                            recipientType: p.recipientType,
                            payments: [],
                            totalAmount: 0
                        };
                    }
                    groupedByRecipient[key].payments.push(p);
                    groupedByRecipient[key].totalAmount += p.amount;
                });

                // 支払先ごとに出力
                Object.values(groupedByRecipient).forEach((group, index) => {
                    report += `【支払先 ${index + 1}】\n`;
                    report += `受取人: ${group.recipientName}\n`;
                    report += `種別: ${getRecipientTypeName(group.recipientType)}\n`;
                    report += "-".repeat(50) + "\n";

                    group.payments.forEach((p, idx) => {
                        const contract = store.getAllContracts().find(c => c.propertyMcd === p.propertyMcd);
                        report += `${idx + 1}. 支払日: ${p.date}\n`;
                        report += `   物件: ${contract ? contract.propertyName : p.propertyMcd}\n`;
                        report += `   目的: ${p.purpose}\n`;
                        report += `   金額: ¥${p.amount.toLocaleString()}\n`;
                        if (p.bankInfo && p.bankInfo.bankName) {
                            report += `   口座: ${p.bankInfo.bankName} ${p.bankInfo.branchName} ${p.bankInfo.accountType} ${p.bankInfo.accountNumber}\n`;
                        }
                        report += "\n";
                    });

                    report += `合計金額: ¥${group.totalAmount.toLocaleString()}\n\n`;
                });

                report += "\n＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝\n";
                report += "                  以上\n";
                report += "＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝\n";

                // ファイルとしてダウンロード
                const blob = new Blob([report], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `法定調書_${year}年度_${new Date().toISOString().split('T')[0]}.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                setGenerating(false);
            };

            const getRecipientTypeName = (type) => {
                switch (type) {
                    case 'landlord': return '貸主';
                    case 'management': return '管理会社';
                    case 'broker': return '仲介会社';
                    case 'other': return 'その他';

                                ))}
                            </select>
                        </div>

                        <div className="form-group">
                            <label className="form-label">出力形式</label>
                            <select
                                className="form-select"
                                value={reportType}
                                onChange={e => setReportType(e.target.value)}
                            >
                                <option value="all">すべての支払い</option>
                                <option value="statutory">法定調書対象のみ</option>
                                <option value="summary">サマリー形式</option>
                            </select>
                        </div>
                    </div>

                    <div style={{ background: '#f8fafc', borderRadius: '0.5rem', padding: '1.5rem', marginBottom: '2rem' }}>
                        <h4 style={{ marginTop: 0, marginBottom: '1rem' }}>統計情報</h4>
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '1rem' }}>
                            <div style={{ textAlign: 'center' }}>
                                <div style={{ fontSize: '0.875rem', color: 'var(--text-muted)', marginBottom: '0.25rem' }}>対象年度の支払い</div>
                                <div style={{ fontSize: '1.5rem', fontWeight: 'bold', color: 'var(--primary-color)' }}>{yearlyPayments.length}件</div>
                            </div>
                            <div style={{ textAlign: 'center' }}>
                                <div style={{ fontSize: '0.875rem', color: 'var(--text-muted)', marginBottom: '0.25rem' }}>法定調書対象</div>
                                <div style={{ fontSize: '1.5rem', fontWeight: 'bold', color: statutoryPayments.length > 0 ? '#dc2626' : '#10b981' }}>
                                    {statutoryPayments.length}件
                                </div>
                            </div>
                            <div style={{ textAlign: 'center' }}>
                                <div style={{ fontSize: '0.875rem', color: 'var(--text-muted)', marginBottom: '0.25rem' }}>総支払額</div>
                                <div style={{ fontSize: '1.5rem', fontWeight: 'bold' }}>
                                    ¥{yearlyPayments.reduce((sum, p) => sum + p.amount, 0).toLocaleString()}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div style={{ display: 'flex', gap: '1rem', justifyContent: 'center' }}>
                        <button
                            className="btn btn-primary"
                            onClick={generateReport}
                            disabled={generating || statutoryPayments.length === 0}
                            style={{ minWidth: '200px' }}

                            {generating ? '生成中...' : '法定調書を出力'}
                        </button>
                        <button
                            className="btn btn-outline"
                            onClick={() => {
                                // CSV出力
                                const csvData = store.exportToCSV('payment_history');
                                const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
                                const blob = new Blob([bom, csvData], { type: 'text/csv;charset=utf-8;' });
                                const link = document.createElement("a");
                                const url = URL.createObjectURL(blob);
                                link.setAttribute("href", url);
                                link.setAttribute("download", `payment_history_${year}年.csv`);
                                link.style.visibility = 'hidden';
                                document.body.appendChild(link);

                                document.body.removeChild(link);

                    </div>
